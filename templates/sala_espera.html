<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espera un ratito, amor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .container { padding: 20px; border: 1px solid #333; border-radius: 20px; background: #111; }
        h1 { color: #ff99cc; }
        p { font-style: italic; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 Acceso en proceso...</h1>
        <p>"Amor, a menos que te cases conmigo voy a ser cariñosa"</p>
        <p>Tu dispositivo está siendo verificado por el Norte. ¡Espera un ratito!</p>
    </div>
    <script>
        // Esto hace que la página se refresque sola cada 5 segundos 
        // para que entre a la bóveda apenas tú la autorices
        setInterval(() => {
            fetch('/check_autorizacion')
                .then(res => { if(res.status === 200) window.location.href = '/boveda'; });
        }, 5000);
    </script>
</body>
</html>
