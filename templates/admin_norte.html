<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Norte</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; padding: 20px; }
        .dispositivo { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 15px; margin: 15px auto; max-width: 400px; }
        .btn-autorizar { background: #28a745; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; margin-top: 10px; }
        .espera { color: #ffc107; font-size: 0.9em; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>🛰️ Panel del Norte</h1>
    <p>Gestiona quién entra a la Bóveda</p>

    {% for d in dispositivos %}
    <div class="dispositivo">
        <p><strong>Dispositivo:</strong> {{ d[1] }}</p>
        <p class="espera">Estado: Pendiente de aprobación</p>
        <a href="{{ url_for('autorizar_dispositivo', id=d[0]) }}" class="btn-autorizar">DAR ACCESO AHORA</a>
    </div>
    {% else %}
    <p>No hay nadie esperando acceso por ahora.</p>
    {% endfor %}

    <br><br>
    <a href="/boveda" style="color: #666; text-decoration: none;">← Volver a la Bóveda</a>
</body>
</html>
