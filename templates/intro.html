<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Cebollita May</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Overlay Blindado: Fondo negro total y Z-Index máximo */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000; z-index: 9999;
        }
        /* Botón Sólido: Más fácil de presionar en celulares */
        .btn-inicio {
            padding: 20px 50px; font-size: 22px; cursor: pointer;
            background: #fff; color: #000; border: none;
            border-radius: 50px; text-transform: uppercase; font-weight: bold;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn-inicio" onclick="comenzar()">Entrar al Universo</button>
    </div>

    <canvas id="canvas"></canvas>

    <audio id="musica" src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a" loop preload="auto"></audio>
    <audio id="voz" src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const musica = document.getElementById('musica');
        const voz = document.getElementById('voz');

        let estrellas = [];
        let mensajeActual = "";
        let animando = false;
        let fase = "paz";

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        function comenzar() {
            // 1. Quitar el bloqueo visual al instante
            document.getElementById('overlay').style.display = 'none';
            
            // 2. Forzar audios (Acción directa del usuario)
            musica.volume = 0.4;
            musica.play();
            
            animando = true;
            crearEstrellas();
            update();

            // 3. Cronograma de los 6 Pasos
            setTimeout(() => { mensajeActual = "Hola cebollita May..."; }, 5000);
            
            setTimeout(() => { 
                mensajeActual = "Gracias por ser mi paz en medio del ruido.\nAmo conocer cada capa de ti."; 
            }, 20000);

            setTimeout(() => {
                mensajeActual = "";
                musica.volume = 0.1;
                voz.play(); // Tu voz ahora tiene permiso del navegador
                fase = "corazon";
            }, 45000);

            setTimeout(() => { mensajeActual = "👩‍❤️‍💋‍👨\nTe amo, May"; }, 58000);

            setTimeout(() => { window.location.href = "boveda.html"; }, 63000);
        }

        function crearEstrellas() {
            for(let i=0; i<250; i++) {
                const t = (i / 250) * 2 * Math.PI;
                estrellas.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    // Destinos para el corazón final
                    tx: (16 * Math.sin(t)**3) * 13 + canvas.width/2,
                    ty: (-(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))) * 13 + canvas.height/2,
                    r: Math.random() * 2,
                    color: '#fff'
                });
            }
        }

        function update() {
            if(!animando) return;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            estrellas.forEach(e => {
                if(fase === "paz") {
                    e.y -= 0.6; if(e.y < 0) e.y = canvas.height;
                } else {
                    // Animación del corazón
                    e.x += (e.tx - e.x) * 0.05;
                    e.y += (e.ty - e.y) * 0.05;
                    e.color = "#ff4d6d";
                }
                ctx.fillStyle = e.color;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
            });

            if(mensajeActual) {
                ctx.fillStyle = "white";
                ctx.font = "22px monospace";
                ctx.textAlign = "center";
                const lines = mensajeActual.split('\n');
                lines.forEach((l, i) => ctx.fillText(l, canvas.width/2, canvas.height/2 + (i*45)));
            }
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
