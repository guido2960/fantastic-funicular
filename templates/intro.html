<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Universo para mi Administradora</title>
    <style>
        body { margin: 0; background: black; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #canvasUniverso { position: absolute; top: 0; left: 0; }
        #interfaz { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #btn-entrar { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #ff4d94; border: none; color: white; border-radius: 50px; box-shadow: 0 0 20px #ff4d94; }
        #texto-emocional { font-size: 26px; text-align: center; max-width: 80%; text-shadow: 0 0 10px #ff4d94; min-height: 1.5em; }
        .oculto { display: none !important; }
    </style>
</head>
<body>

<div id="pantalla-inicio" style="position:fixed; width:100%; height:100%; background:black; z-index:100; display:flex; justify-content:center; align-items:center;">
    <button id="btn-entrar" onclick="iniciarTodo()">Entrar al Universo de Mayda</button>
</div>

<div id="interfaz" class="oculto">
    <div id="texto-emocional"></div>
</div>
<canvas id="canvasUniverso"></canvas>

<audio id="audioVoz" preload="auto">
    <source src="TU_URL_DE_CLOUDINARY_AQUÍ" type="audio/mpeg">
</audio>

<script>
    const textoElemento = document.getElementById('texto-emocional');
    const audio = document.getElementById('audioVoz');
    const canvas = document.getElementById('canvasUniverso');
    const ctx = canvas.getContext('2d');
    
    let fase = "estrellas"; // estrellas -> abrazo -> corazon -> fuegos
    let particulas = [];
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const mensajes = [
        "",
        "Hola mi administradora favorita...", 
        "Gracias por ser mi paz y mi norte...", 
        "Escucha esto que tengo para ti...", 
        "Te amo con todas mis capas, May ❤️",
        "👩‍❤️‍💋‍👨" // Estructura 6: El beso
    ];

    function escribir(txt) {
        let i = 0; textoElemento.innerHTML = "";
        const intervalo = setInterval(() => {
            if(i < txt.length) { textoElemento.innerHTML += txt.charAt(i); i++; }
            else clearInterval(intervalo);
        }, 70);
    }

    function iniciarTodo() {
        document.getElementById('pantalla-inicio').classList.add('oculto');
        document.getElementById('interfaz').classList.remove('oculto');
        
        // --- 0s: Inicia la Paz (Estrellas subiendo) ---
        animar(); 

        // --- 5s: Primer mensaje ---
        setTimeout(() => escribir(mensajes[1]), 5000);

        // --- 20s: Reflexión de las Capas ---
        setTimeout(() => escribir(mensajes[2]), 20000);

        // --- 45s: Tu Voz y "El Abrazo" (Las estrellas se juntan) ---
        setTimeout(() => {
            escribir(mensajes[3]);
            audio.play();
            fase = "abrazo"; 
        }, 45000);

        // --- 55s: El Corazón Rosa ---
        setTimeout(() => {
            fase = "corazon";
            escribir(mensajes[4]);
        }, 55000);

        // --- 58s: Explosión final, Beso y Bóveda ---
        setTimeout(() => {
            fase = "fuegos";
            escribir(mensajes[5]);
            setTimeout(() => window.location.href = "/boveda", 5000);
        }, 58000);
    }

    // Lógica básica de animación (Simplificada para que funcione de una)
    function animar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Aquí va tu lógica de dibujo de estrellas/corazón/explosión
        // que ya tienes en tu versión anterior.
        requestAnimationFrame(animar);
    }
</script>
</body>
</html>
