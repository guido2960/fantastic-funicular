<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Norte - Mayda</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Capas de fondo (Invisibles al clic) */
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        
        /* Contenedor de mensajes */
        .contenedor-texto {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; width: 85%; z-index: 10; pointer-events: none;
        }

        #mensaje-dinamico {
            font-size: 1.6rem; text-shadow: 0 0 15px #bc13fe;
            opacity: 0; transition: opacity 1s; font-style: italic;
        }

        /* EL BOTÓN: Ahora es un elemento flotante independiente */
        #btn-final {
            display: none; position: fixed; bottom: 15%; left: 50%;
            transform: translateX(-50%); z-index: 99999; /* Máxima prioridad */
            padding: 20px 50px; background: #bc13fe; color: white;
            border: 2px solid white; border-radius: 50px; font-weight: bold;
            font-size: 1.4rem; cursor: pointer; text-decoration: none;
            box-shadow: 0 0 30px #bc13fe; pointer-events: auto !important;
        }

        /* Pantalla de inicio */
        .cortina {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100000; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="cortina" id="cortina" onclick="iniciar()"> [ CLIC PARA TU SORPRESA ] </div>

    <div class="contenedor-texto">
        <h1 style="color: #bc13fe; letter-spacing: 5px;">MAYDA</h1>
        <p id="mensaje-dinamico"></p>
    </div>

    <button id="btn-final" onclick="irABoveda()">ENTRAR A NUESTRA BÓVEDA</button>

    <canvas id="universo"></canvas>
    <audio id="musica" loop src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772983408/para_ti_Mayda_xkgwz4.mp3"></audio>

    <script>
        // Redirección directa a tu ruta de Python
        function irABoveda() {
            window.location.href = "/boveda";
        }

        const canvas = document.getElementById('universo');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let stars = [];
        for(let i=0; i<100; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*3});

        function animar() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#bc13fe";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y += 0.5; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(animar);
        }

        const poesia = [
            "A veces tengo ganas de ser cursi para decirle: La amo con locura.",
            "Mayda, admiro tu sacrificio en la cevichería para pagar tu carrera.",
            "Estamos unidos en esto. No te voy a abandonar nunca.",
            "Somos un equipo. Te amo profundamente. Tu Abel."
        ];

        function secuencia(i) {
            const p = document.getElementById('mensaje-dinamico');
            if(i < poesia.length) {
                p.innerText = poesia[i];
                p.style.opacity = 1;
                setTimeout(() => {
                    p.style.opacity = 0;
                    setTimeout(() => secuencia(i+1), 1000);
                }, 5000);
            } else {
                // Aparece el botón al final
                document.getElementById('btn-final').style.display = "block";
            }
        }

        function iniciar() {
            document.getElementById('cortina').style.display = "none";
            document.getElementById('musica').play();
            animar();
            secuencia(0);
        }
    </script>
</body>
</html>
