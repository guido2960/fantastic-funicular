<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestro Universo - Abel & Mayda</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #canvasUniverso { position: absolute; top: 0; left: 0; }
        #interfaz { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        #texto-emocional { 
            font-size: 24px; text-align: center; text-shadow: 0 0 10px #ff4d94; 
            padding: 40px; font-weight: bold; max-width: 75%; line-height: 1.6;
        }
        #pantalla-inicio { position: fixed; width: 100%; height: 100%; background: black; z-index: 100; display: flex; justify-content: center; align-items: center; }
        #btn-entrar { padding: 15px 35px; font-size: 20px; cursor: pointer; background: transparent; border: 2px solid #ff4d94; color: white; border-radius: 30px; box-shadow: 0 0 15px #ff4d94; transition: 0.5s; }
        #btn-entrar:hover { background: #ff4d94; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="pantalla-inicio">
    <button id="btn-entrar" onclick="iniciarHistoria()">Entrar a nuestro universo</button>
</div>

<div id="interfaz"><div id="texto-emocional"></div></div>
<canvas id="canvasUniverso"></canvas>

<audio id="musicaFondo" loop><source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a" type="audio/mp4"></audio>
<audio id="audioVoz"><source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4" type="audio/mp4"></audio>

<script>
    const canvas = document.getElementById('canvasUniverso');
    const ctx = canvas.getContext('2d');
    const textoDiv = document.getElementById('texto-emocional');
    const musica = document.getElementById('musicaFondo');
    const voz = document.getElementById('audioVoz');
    
    let particulas = [];
    let estrellasFijas = []; 
    let fase = "paz"; 
    let escribirInterval;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    for(let i=0; i<400; i++) {
        estrellasFijas.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            z: Math.random() * canvas.width, 
            opacidad: Math.random()
        });
    }

    class Particula {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = -Math.random() * 0.5;
            this.color = "white";
            this.tamaño = Math.random() * 1.5;
            this.opacidad = Math.random();
            this.objetivoX = null;
            this.objetivoY = null;
        }
        actualizar() {
            if (["arbol", "avion", "edificio", "corazon"].includes(fase)) {
                this.x += (this.objetivoX - this.x) * 0.05;
                this.y += (this.objetivoY - this.y) * 0.05;
            } else {
                this.y += this.vy;
                if (this.y < 0) this.y = canvas.height;
            }
        }
        dibujar() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.tamaño, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.opacidad;
            ctx.fill();
        }
    }

    for (let i = 0; i < 800; i++) particulas.push(new Particula());

    function escribir(txt) {
        clearInterval(escribirInterval);
        let i = 0; textoDiv.innerHTML = "";
        escribirInterval = setInterval(() => {
            if(i < txt.length) { textoDiv.innerHTML += txt.charAt(i); i++; }
            else clearInterval(escribirInterval);
        }, 90);
    }

    function formarFigura(tipo) {
        fase = tipo;
        particulas.forEach((p, i) => {
            const t = i / particulas.length * Math.PI * 2;
            if (tipo === "arbol") {
                p.color = "#4CAF50";
                if (i < 450) { p.objetivoX = canvas.width/2 + Math.cos(i)*150 * Math.random(); p.objetivoY = canvas.height/2 - 50 - Math.random()*150; }
                else { p.objetivoX = canvas.width/2 + (i%15 - 7); p.objetivoY = canvas.height/2 + (i%120); }
            } else if (tipo === "avion") {
                p.color = "#87CEEB";
                if (i < 300) { p.objetivoX = canvas.width/2 + (Math.cos(i)*250); p.objetivoY = canvas.height/2 + (i%2===0?5:-5); }
                else { p.objetivoX = canvas.width/2 + (i-500)*2; p.objetivoY = canvas.height/2; }
            } else if (tipo === "corazon") {
                p.color = "#ff4d94";
                p.objetivoX = canvas.width/2 + 160 * Math.pow(Math.sin(t), 3);
                p.objetivoY = canvas.height/2 - (130 * Math.cos(t) - 50 * Math.cos(2*t) - 25 * Math.cos(3*t) - 10 * Math.cos(4*t));
            }
        });
    }

    function iniciarHistoria() {
        document.getElementById('pantalla-inicio').style.display = 'none';
        musica.volume = 0.3; musica.play();

        escribir("Todo comenzó con esta paz que me diste...");
        
        setTimeout(() => { formarFigura("arbol"); escribir("Cada capa de tu alma vale la pena."); }, 8000);
        setTimeout(() => { formarFigura("avion"); escribir("Mi vida vuela hacia tu Norte."); }, 18000);
        
        // CONEXIÓN DIRECTA A LA BÓVEDA
        setTimeout(() => { 
            formarFigura("corazon"); 
            musica.volume = 0.1; 
            voz.play(); 
            escribir("TE AMO PARA SIEMPRE, MAYDA"); 
            
            // Al terminar la voz y el mensaje, redirigir a la ruta de Python
            setTimeout(() => { 
                document.body.style.transition = "opacity 3s"; 
                document.body.style.opacity = "0"; 
                setTimeout(() => { 
                    window.location.href = "/boveda"; // Esta es la llave que abre tu Python
                }, 3000); 
            }, 10000);
        }, 28000);
    }

    function animar() {
        ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        estrellasFijas.forEach(ef => {
            ef.z -= 0.5;
            if (ef.z <= 0) ef.z = canvas.width;
            let x = (ef.x - canvas.width/2) * (canvas.width/ef.z) + canvas.width/2;
            let y = (ef.y - canvas.height/2) * (canvas.width/ef.z) + canvas.height/2;
            let s = (1 - ef.z/canvas.width) * 2;
            ctx.fillStyle = "white"; ctx.globalAlpha = ef.opacidad;
            ctx.fillRect(x, y, s, s);
        });
        particulas.forEach(p => { p.actualizar(); p.dibujar(); });
        requestAnimationFrame(animar);
    }
    animar();
</script>
</body>
</html>
