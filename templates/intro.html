<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Norte - Mayda</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; }
        .capa-cebolla { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 30%, #050505 90%); z-index: 5; pointer-events: none; }
        
        .interfaz {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 85%; pointer-events: none;
        }

        #mensaje-dinamico {
            font-size: 1.5rem;
            text-shadow: 0 0 15px #bc13fe;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            line-height: 1.6;
            font-style: italic;
        }

        .btn-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.98); cursor: pointer; z-index: 100;
            text-transform: uppercase; letter-spacing: 4px; text-align: center;
            font-weight: bold;
        }

        #btn-boveda {
            margin-top: 20px; padding: 10px 20px; background: transparent;
            border: 1px solid #bc13fe; color: #bc13fe; cursor: pointer;
            pointer-events: auto; display: none; text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="btn-inicio" id="overlay"><span>[ CLIC PARA ESCUCHAR EL HOMENAJE DE ABEL ]</span></div>
    <div class="capa-cebolla"></div>
    
    <div class="interfaz">
        <h1 style="color: #bc13fe; letter-spacing: 8px; margin-bottom: 20px;">DÍA DE LA MUJER</h1>
        <p id="mensaje-dinamico"></p>
        <a href="/boveda" id="btn-boveda">ENTRAR A NUESTRA BÓVEDA</a>
    </div>

    <canvas id="escena"></canvas>

    <audio id="audioFondo" loop src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772983408/para_ti_Mayda_xkgwz4.mp3"></audio>

    <script>
        const canvas = document.getElementById('escena');
        const ctx = canvas.getContext('2d');
        let particles = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Narrativa completa que Abel dedica a Mayda
        const narrativa = [
            "A veces tengo ganas de ser cursi para decirle: La amo a usted con locura.",
            "A veces tengo ganas de ser tonto para gritar: ¡La quiero tanto!",
            "A veces tengo ganas de ser niño para llorar acurrucado en tu seno.",
            "A veces tengo ganas de estar muerto para sentir bajo la tierra la humedad.",
            "Y que de mis jugos me crezca una flor rompiendo el pecho. Y decir: Esta flor para usted.",
            "Mayda, admiro tu sacrificio trabajando en la cevichería para pagar tu carrera.",
            "Hoy sigues luchando por convertirte en lo que sueñas, y quiero que sepas algo...",
            "Estamos unidos en esto. No te voy a abandonar nunca, estoy contigo en cada paso.",
            "Somos un equipo, mi Norte. Tu Abel estará siempre aquí. Te amo profundamente."
        ];

        function hablar(texto) {
            const mensaje = new SpeechSynthesisUtterance(texto);
            mensaje.lang = 'es-ES';
            mensaje.rate = 0.85; 
            mensaje.pitch = 0.9; 
            window.speechSynthesis.speak(mensaje);
        }

        function secuencia(index) {
            if (index < narrativa.length) {
                const el = document.getElementById('mensaje-dinamico');
                el.innerText = narrativa[index];
                el.style.opacity = 1;
                hablar(narrativa[index]);

                setTimeout(() => {
                    el.style.opacity = 0;
                    setTimeout(() => secuencia(index + 1), 1500);
                }, 8500); 
            } else {
                // Al terminar, muestra el botón para ir a la Bóveda
                document.getElementById('btn-boveda').style.display = 'inline-block';
            }
        }

        class Particula {
            constructor() { this.reset(); }
            reset() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.size = Math.random() * 3 + 1;
                this.angle = Math.random() * Math.PI * 2;
                this.velocity = Math.random() * 3 + 1;
                this.color = '#bc13fe';
                this.alpha = 1;
            }
            update() {
                this.x += Math.cos(this.angle) * this.velocity;
                this.y += Math.sin(this.angle) * this.velocity;
                this.alpha -= 0.003;
                if (this.alpha <= 0) this.reset();
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill(); ctx.restore();
            }
        }

        function animar() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animar);
        }

        document.getElementById('overlay').onclick = function() {
            this.style.display = 'none';
            document.getElementById('audioFondo').play();
            for(let i=0; i<200; i++) particles.push(new Particula());
            animar();
            secuencia(0);
        };
    </script>
</body>
</html
