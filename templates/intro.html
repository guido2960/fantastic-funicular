<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo Abel & Mayda</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; display: none; }
        #pantalla-inicio { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center; 
        }
        #btn-entrar { 
            padding: 20px 50px; font-size: 22px; cursor: pointer; background: transparent; 
            border: 2px solid #ff4d94; color: white; border-radius: 50px; 
            box-shadow: 0 0 20px #ff4d94; font-weight: bold;
        }
        #texto-emocional { 
            position: relative; z-index: 10; font-size: 24px; text-align: center; 
            text-shadow: 0 0 15px #ff4d94; padding: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="pantalla-inicio">
    <button id="btn-entrar" onclick="iniciar()">ENTRAR AL UNIVERSO</button>
</div>

<div id="interfaz" style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <div id="texto-emocional"></div>
</div>
<canvas id="canvasUniverso"></canvas>

<audio id="musicaFondo" loop><source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a" type="audio/mp4"></audio>
<audio id="audioVoz"><source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4" type="audio/mp4"></audio>

<script>
    const canvas = document.getElementById('canvasUniverso');
    const ctx = canvas.getContext('2d');
    const textoDiv = document.getElementById('texto-emocional');
    let fase = "paz", particulas = [];

    function iniciar() {
        document.getElementById('pantalla-inicio').style.display = 'none';
        canvas.style.display = 'block';
        
        // Carga de audio inmediata al clic
        document.getElementById('musicaFondo').play();
        
        // Iniciar motor visual solo después del clic
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for (let i = 0; i < 1500; i++) particulas.push(new Particula());
        
        animar();
        correrHistoria();
    }

    class Particula {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.targetX = this.x; this.targetY = this.y;
            this.color = "255, 255, 255";
            this.size = 1.5;
        }
        update() {
            if (fase === "paz") { this.y -= 0.5; if (this.y < 0) this.y = canvas.height; }
            else {
                this.x += (this.targetX - this.x) * 0.1;
                this.y += (this.targetY - this.y) * 0.1;
            }
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fillStyle = rgb(${this.color}); ctx.fill();
        }
    }

    function escribir(t, cb) {
        let i = 0; textoDiv.innerHTML = "";
        let it = setInterval(() => {
            if(i < t.length) { textoDiv.innerHTML += t.charAt(i); i++; }
            else { clearInterval(it); setTimeout(cb, 2500); }
        }, 60);
    }

    function correrHistoria() {
        escribir("Todo comenzó con esta paz que me diste...", () => {
            fase = "corazon";
            particulas.forEach((p, i) => {
                const a = (i / particulas.length) * Math.PI * 2;
                p.color = "255, 77, 148";
                p.targetX = canvas.width/2 + 250 * Math.pow(Math.sin(a), 3);
                p.targetY = canvas.height/2 - (200 * Math.cos(a) - 80 * Math.cos(2*a) - 40 * Math.cos(3*a) - 15 * Math.cos(4*a));
            });
            escribir("TE AMO PARA SIEMPRE, MAYDA", () => {
                document.body.style.transition = "opacity 3s";
                document.body.style.opacity = "0";
                setTimeout(() => { window.location.href = "/boveda"; }, 3000);
            });
        });
    }

    function animar() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particulas.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animar);
    }
</script>
</body>
</html>
