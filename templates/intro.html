<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo Abel & Mayda</title>
    <style>
        /* 1. RESET Y FONDO SEGURO */
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; width: 100vw; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; display: none; } /* Oculto al inicio para no trabar */

        /* 2. BOTÓN ESTABLE (No se deforma) */
        #pantalla-inicio { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; 
        }
        #btn-entrar { 
            padding: 18px 45px; font-size: 20px; cursor: pointer; background: transparent; 
            border: 2px solid #ff4d94; color: white; border-radius: 50px; 
            box-shadow: 0 0 20px #ff4d94; transition: 0.3s; letter-spacing: 3px; font-weight: bold;
            pointer-events: auto;
        }
        #btn-entrar:hover { background: #ff4d94; transform: scale(1.05); }

        #interfaz { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        #texto-emocional { 
            font-size: 26px; text-align: center; text-shadow: 0 0 20px #ff4d94; 
            padding: 40px; font-weight: bold; max-width: 80%; line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="pantalla-inicio">
    <button id="btn-entrar" onclick="iniciarHistoria()">ENTRAR AL UNIVERSO</button>
</div>

<div id="interfaz"><div id="texto-emocional"></div></div>
<canvas id="canvasUniverso"></canvas>

<audio id="musicaFondo" loop preload="auto"><source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a" type="audio/mp4"></audio>
<audio id="audioVoz" preload="auto"><source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4" type="audio/mp4"></audio>

<script>
    const canvas = document.getElementById('canvasUniverso');
    const ctx = canvas.getContext('2d');
    const textoDiv = document.getElementById('texto-emocional');
    const musica = document.getElementById('musicaFondo');
    const voz = document.getElementById('audioVoz');
    
    let particulas = [], estrellasCine = [], fase = "paz", iniciado = false;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Crear la data pero NO animar todavía
    function prepararUniverso() {
        for(let i=0; i<400; i++) {
            estrellasCine.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, z: Math.random() * canvas.width, opacidad: Math.random() });
        }
        for (let i = 0; i < 2000; i++) particulas.push(new Particula());
    }

    class Particula {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 4; this.vy = (Math.random() - 0.5) * 4;
            this.targetX = this.x; this.targetY = this.y;
            this.color = "255, 255, 255"; this.size = Math.random() * 2 + 0.5;
            this.opacidad = 1; this.speed = 0.1;
        }
        update() {
            if (fase === "paz") { this.y -= 0.8; if (this.y < 0) this.y = canvas.height; }
            else if (fase === "fuegos") { this.x += this.vx * 4; this.y += this.vy * 4; this.opacidad -= 0.015; }
            else if (fase === "petalos") { this.y += 2; this.x += Math.sin(this.y * 0.02) * 3; if (this.y > canvas.height) this.y = -20; }
            else { this.x += (this.targetX - this.x) * this.speed; this.y += (this.targetY - this.y) * this.speed; }
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = fase === "petalos" ? rgba(255, 100, 150, ${this.opacidad}) : rgb(${this.color});
            ctx.globalAlpha = Math.max(0, this.opacidad); ctx.fill();
        }
    }

    function escribir(txt, callback, delay = 2000) {
        let i = 0; textoDiv.innerHTML = "";
        const intervalId = setInterval(() => {
            if(i < txt.length) { textoDiv.innerHTML += txt.charAt(i); i++; }
            else { clearInterval(intervalId); if(callback) setTimeout(callback, delay); }
        }, 65);
    }

    function formarFigura(tipo) {
        fase = tipo;
        particulas.forEach((p, i) => {
            const ang = (i / particulas.length) * Math.PI * 2;
            if (tipo === "arbol") {
                p.color = "140, 255, 140";
                if (i < 1100) { p.targetX = canvas.width/2 + Math.cos(i)*170 * Math.random(); p.targetY = canvas.height/2 - 50 - Math.random()*230; }
                else { p.targetX = canvas.width/2 + (i%20 - 10); p.targetY = canvas.height/2 + (i%150); }
            } else if (tipo === "avion") {
                p.color = "150, 230, 255";
                if (i < 900) { p.targetX = canvas.width/2 + (Math.cos(i)*400); p.targetY = canvas.height/2 + (i%2===0?12:-12); }
                else { p.targetX = canvas.width/2 + (i-1400)*4.5; p.targetY = canvas.height/2; }
            } else if (tipo === "corazon") {
                p.color = "255, 77, 148";
                p.targetX = canvas.width/2 + 280 * Math.pow(Math.sin(ang), 3);
                p.targetY = canvas.height/2 - (220 * Math.cos(ang) - 90 * Math.cos(2*ang) - 45 * Math.cos(3*ang) - 20 * Math.cos(4*ang));
            }
        });
    }

    // FUNCIÓN DE INICIO CRÍTICA
    function iniciarHistoria() {
        if(iniciado) return;
        iniciado = true;

        // 1. Desaparecer botón AL TOQUE
        document.getElementById('pantalla-inicio').style.display = 'none';
        canvas.style.display = 'block';

        // 2. Arrancar audios
        musica.volume = 0.4;
        musica.play().catch(e => console.log("Audio bloqueado"));

        // 3. Preparar y Animar
        prepararUniverso();
        animar();

        // 4. Iniciar Texto
        escribir("Todo comenzó con esta paz que me diste, mi Administradora favorita...", () => {
            formarFigura("arbol");
            escribir("Me tomó tiempo entender cada capa de tu alma, pero cada una vale la pena.", () => {
                formarFigura("avion");
                escribir("Admiro tu fuerza en Modo Acción... mi vida vuela hacia tu Norte.", () => {
                    fase = "paz";
                    escribir("Tomo en serio cada mensaje y video que me mandas... me encanta cómo eres.", () => {
                        formarFigura("corazon");
                        musica.volume = 0.15; voz.play();
                        escribir("Escucha esto que guardé solo para ti...", () => {
                            escribir("👩‍❤️‍💋‍👨 TE AMO PARA SIEMPRE, MAYDA 👩‍❤️‍💋‍👨", () => {
                                fase = "fuegos";
                                setTimeout(() => { 
                                    fase = "petalos"; 
                                    particulas.forEach(p => { p.size = 3.5; p.opacidad = 0.8; });
                                }, 1500);
                                setTimeout(() => {
                                    document.body.style.transition = "opacity 4s";
                                    document.body.style.opacity = "0";
                                    setTimeout(() => { window.location.href = "/boveda"; }, 4000);
                                }, 8000);
                            }, 5000);
                        }, 1000);
                    });
                });
            });
        });
    }

    function animar() {
        let g = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
        g.addColorStop(0, "#0c001a"); g.addColorStop(1, "#000");
        ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = "lighter";
        estrellasCine.forEach(ef => {
            ef.z -= 0.8; if (ef.z <= 0) ef.z = canvas.width;
            let x = (ef.x - canvas.width/2) * (canvas.width/ef.z) + canvas.width/2;
            let y = (ef.y - canvas.height/2) * (canvas.width/ef.z) + canvas.height/2;
            let s = (1 - ef.z/canvas.width) * 1.8;
            ctx.fillStyle = "white"; ctx.globalAlpha = ef.opacidad * 0.7; ctx.fillRect(x, y, s, s);
        });
        particulas.forEach(p => { p.update(); p.draw(); });
        ctx.globalCompositeOperation = "source-over";
        requestAnimationFrame(animar);
    }
</script>
</body>
</html>
