<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayda // System</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff1493; --cyan: #00f2ff; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; }

        /* Capas de fondo */
        #starfield { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #galaxy { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        
        /* Contenedor de Intro - PRIORIDAD MÁXIMA */
        #intro-layer { 
            position: fixed; inset: 0; z-index: 1000000; 
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
        }

        #start-btn { 
            margin-top: 30px; padding: 22px 65px; 
            border: 4px solid var(--pink); background: transparent; 
            color: var(--pink); cursor: pointer !important; 
            font-family: 'Fira Code'; font-weight: bold; font-size: 24px; 
            text-transform: uppercase; letter-spacing: 3px;
            transition: 0.3s; position: relative; pointer-events: all;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
        }
        #start-btn:hover { background: var(--pink); color: white; box-shadow: 0 0 60px var(--pink); }

        /* Elementos de animación */
        .ring-container { position: absolute; left: 50%; top: 50%; transform-style: preserve-3d; animation: galaxyRotate 35s linear infinite; }
        @keyframes galaxyRotate {
            0% { transform: translate(-50%, -50%) rotateX(75deg) rotateZ(0deg); }
            100% { transform: translate(-50%, -50%) rotateX(75deg) rotateZ(360deg); }
        }
        .ring-text { position: absolute; white-space: nowrap; color: var(--pink); opacity: 0.4; font-size: 14px; font-family: 'Fira Code'; }

        /* Pantalla Final */
        #final-screen { 
            position: fixed; inset: 0; z-index: 2000000; display: none; 
            background: rgba(0,0,0,0.98); flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        .terminal { 
            font-family: 'Fira Code', monospace; color: var(--cyan); 
            background: #0d1117; padding: 30px; border-radius: 12px; 
            border: 1px solid var(--pink); width: 85%; max-width: 550px; 
            height: 350px; overflow-y: auto; margin-bottom: 20px;
        }
        .terminal::-webkit-scrollbar { display: none; }

        #btn-boveda {
            padding: 15px 30px; border: 2px solid var(--cyan); 
            background: rgba(0,242,255,0.1); color: var(--cyan); 
            font-family: 'Fira Code'; font-weight: bold; cursor: pointer !important;
            display: none; animation: fadeIn 1s forwards; text-decoration: none;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Fotos y partículas */
        .photo { position: absolute; width: 220px; height: 220px; border-radius: 15px; border: 2px solid white; object-fit: cover; z-index: 50; pointer-events: none; }
    </style>
</head>
<body>

    <div id="intro-layer">
        <h1 style="font-family:'Fira Code'; text-shadow: 0 0 20px var(--pink); font-size: 2.5em;">&lt;MAYDA_SYSTEM/&gt;</h1>
        <p style="color: #555; letter-spacing: 5px; font-size: 12px;">AUTENTICACIÓN REQUERIDA</p>
        <button id="start-btn">CONECTAR</button>
    </div>

    <canvas id="starfield"></canvas>
    <div id="galaxy"><div class="ring-container" id="ring"></div></div>
    
    <div id="final-screen">
        <div style="font-size: 50px; margin-bottom: 20px;">🛹 ❤️ 🌹</div>
        <div class="terminal" id="term"></div>
        <a href="/boveda" id="btn-boveda">[ ACCEDER A BÓVEDA DIGITAL ]</a>
    </div>

    <audio id="audio" preload="auto">
        <source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1773381592/MAYDA_AMORE_nsel5u.mp4" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audio');
        const introLayer = document.getElementById('intro-layer');
        const term = document.getElementById('term');
        const btnStart = document.getElementById('start-btn');

        // Función de inicio (Blindada)
        function iniciarSistema() {
            introLayer.style.pointerEvents = 'none';
            introLayer.style.display = 'none';
            
            audio.play().catch(e => console.log("Audio en espera de carga"));

            buildGalaxy();
            setInterval(spawnHeart, 600);
            setInterval(spawnPhoto, 4500);
            setInterval(spawnPhrase, 2200);
        }

        // Escuchar tanto click como touch para evitar fallos en móviles
        btnStart.addEventListener('click', iniciarSistema);
        btnStart.addEventListener('touchstart', iniciarSistema);

        // --- Lógica de la Galaxia y Efectos ---
        function buildGalaxy() {
            const container = document.getElementById('ring');
            const texts = ["INDISPENSABLE", "MAYDA", "MI NORTE", "ADMINISTRADORA"];
            for(let i=0; i<20; i++){
                const span = document.createElement('span'); span.className = 'ring-text';
                span.innerText = texts[i%4] + " • ";
                span.style.transform = rotateZ(${i*18}deg) translateY(300px) rotateX(-90deg);
                container.appendChild(span);
            }
        }

        function spawnHeart() {
            const h = document.createElement('div'); h.style.position = 'fixed';
            h.style.left = Math.random()*100+"vw"; h.style.top = Math.random()*100+"vh";
            h.style.color = 'var(--pink)'; h.innerHTML = '❤️'; h.style.zIndex = '10';
            document.body.appendChild(h);
            h.animate([{transform:'scale(0)', opacity:0}, {transform:'scale(1.5)', opacity:1}, {transform:'scale(2)', opacity:0}], 4000).onfinish = () => h.remove();
        }

        function spawnPhoto() {
            const urls = ["https://res.cloudinary.com/dvm2v0zvr/image/upload/v1771000212/lu0vh9dirievwosl19sx.jpg", "https://res.cloudinary.com/dvm2v0zvr/image/upload/v1771012574/htmdh7u7xxvvl43dlxfc.jpg", "https://res.cloudinary.com/dvm2v0zvr/image/upload/v1771012672/zohlnjlunxeafhnzdinx.jpg", "https://res.cloudinary.com/dvm2v0zvr/image/upload/v1772508574/vksygd7avg8adotj5jfs.jpg", "https://res.cloudinary.com/dvm2v0zvr/image/upload/v1772532240/bnxotwbredookmb58sbq.jpg", "https://res.cloudinary.com/dvm2v0zvr/image/upload/v1771173751/o9pc4smsntgueavxurnz.jpg"];
            const img = document.createElement('img'); img.src = urls[Math.floor(Math.random()*urls.length)];
            img.className = 'photo'; img.style.left = (15+Math.random()*70)+"%"; img.style.top = (15+Math.random()*70)+"%";
            document.body.appendChild(img);
            img.animate([{opacity:0, transform:'scale(0.8)'}, {opacity:1, transform:'scale(1)'}, {opacity:0, transform:'scale(1.2)'}], 8000).onfinish = () => img.remove();
        }

        function spawnPhrase() {
            const phrases = ["Indispensable ❤️", "Mi Administradora", "Mi Norte", "Te amo", "El hombre más feliz"];
            const p = document.createElement('div'); p.innerText = phrases[Math.floor(Math.random()*phrases.length)];
            p.style.position = 'fixed'; p.style.color = 'var(--cyan)'; p.style.zIndex = '100';
            p.style.left = Math.random()*80+"vw"; p.style.top = Math.random()*80+"vh";
            p.style.fontFamily = 'Fira Code';
            document.body.appendChild(p);
            p.animate([{opacity:0}, {opacity:1}, {opacity:0}], 5000).onfinish = () => p.remove();
        }

        // --- Final: Máquina de Escribir ---
        audio.onended = () => {
            document.getElementById('final-screen').style.display = 'flex';
            const lines = [
                "> [SYSTEM] Identidad verificada: MAYDA.",
                "> [STATUS] Administradora detectada.",
                "> Me encanta leer cómo te expresas.",
                "> Me haces sentir el hombre más feliz del mundo.",
                "> Gracias por ser mi apoyo y mi norte.",
                "> MORALEJA: Eres indispensable en mi vida.",
                "> while(true) { amarte_siempre(); }",
                "> Acceso total concedido."
            ];
            
            let lIdx = 0;
            function typeLine() {
                if(lIdx < lines.length) {
                    let cIdx = 0;
                    let div = document.createElement('div');
                    div.style.marginBottom = "10px";
                    term.appendChild(div);
                    function typeChar() {
                        if(cIdx < lines[lIdx].length) {
                            div.innerHTML += lines[lIdx].charAt(cIdx);
                            cIdx++; setTimeout(typeChar, 40);
                        } else {
                            lIdx++; setTimeout(typeLine, 700);
                        }
                        term.scrollTop = term.scrollHeight;
                    }
                    typeChar();
                } else {
                    document.getElementById('btn-boveda').style.display = 'inline-block';
                }
            }
            typeLine();
        };

        // Estrellas
        const sCtx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const stars = Array(150).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: Math.random()*0.3 }));
        function anim() { sCtx.clearRect(0,0,canvas.width,canvas.height); sCtx.fillStyle="white"; stars.forEach(s => { sCtx.beginPath(); sCtx.arc(s.x, s.y, s.s, 0, Math.PI*2); sCtx.fill(); s.y+=s.v; if(s.y>canvas.height) s.y=0; }); requestAnimationFrame(anim); }
        anim();
    </script>
</body>
</html>
