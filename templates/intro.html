<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Norte - Mayda</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .capa-cebolla { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, #050505 85%); z-index: 5; pointer-events: none; }
        
        .interfaz {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 85%; pointer-events: none;
        }

        #mensaje-dinamico {
            font-size: 1.6rem;
            text-shadow: 0 0 20px #bc13fe, 0 0 30px #ffffff;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            line-height: 1.6;
            font-style: italic;
            font-weight: bold;
        }

        .btn-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.98); cursor: pointer; z-index: 100;
            text-transform: uppercase; letter-spacing: 5px; text-align: center;
            font-weight: bold; font-family: sans-serif;
        }

        #btn-boveda {
            margin-top: 30px; padding: 15px 30px; background: transparent;
            border: 2px solid #bc13fe; color: #bc13fe; cursor: pointer;
            pointer-events: auto; display: none; text-decoration: none;
            font-weight: bold; transition: all 0.3s;
        }
        #btn-boveda:hover { background: #bc13fe; color: white; box-shadow: 0 0 20px #bc13fe; }
    </style>
</head>
<body>

    <div class="btn-inicio" id="overlay"><span>[ CLIC PARA QUE ABEL TE SORPRENDA ]</span></div>
    <div class="capa-cebolla"></div>
    
    <div class="interfaz">
        <h1 style="color: #bc13fe; letter-spacing: 10px; margin-bottom: 25px; text-shadow: 0 0 10px #bc13fe;">MAYDA: NUESTRO UNIVERSO</h1>
        <p id="mensaje-dinamico"></p>
        <a href="/boveda" id="btn-boveda">ENTRAR A NUESTRA BÓVEDA</a>
    </div>

    <canvas id="canvas-universo"></canvas>
    <canvas id="canvas-flores" style="z-index: 6; pointer-events: none;"></canvas>

    <audio id="audioFondo" loop src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772983408/para_ti_Mayda_xkgwz4.mp3"></audio>

    <script>
        // --- CONFIGURACIÓN DE LOS CANVASES ---
        const cUniverso = document.getElementById('canvas-universo');
        const ctxU = cUniverso.getContext('2d');
        const cFlores = document.getElementById('canvas-flores');
        const ctxF = cFlores.getContext('2d');
        
        cUniverso.width = cFlores.width = window.innerWidth;
        cUniverso.height = cFlores.height = window.innerHeight;

        let particles = [];
        let flores = [];
        let lluviaActiva = false;

        // --- SISTEMA 1: EL UNIVERSO DINÁMICO ---
        class Particula {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * cUniverso.width;
                this.y = Math.random() * cUniverso.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.color = Math.random() > 0.1 ? '#bc13fe' : '#ffffff'; // Estrellas púrpura y blancas
                this.alpha = Math.random();
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x<0 || this.x>cUniverso.width || this.y<0 || this.y>cUniverso.height) this.reset();
            }
            draw() {
                ctxU.fillStyle = this.color; ctxU.globalAlpha = this.alpha;
                ctxU.beginPath(); ctxU.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctxU.fill();
            }
        }

        // --- SISTEMA 2: LLUVIA DE ROSAS/CORAZONES ---
        class Flor {
            constructor() {
                this.x = Math.random() * cFlores.width;
                this.y = -50; // Empiezan arriba
                this.size = Math.random() * 15 + 10;
                this.speedY = Math.random() * 2 + 1;
                this.spin = Math.random() * 0.2 - 0.1;
                this.angle = 0;
                // Alternar entre Rosa (🌹) y Corazón (💜)
                this.type = Math.random() > 0.5 ? '🌹' : '💜'; 
            }
            update() {
                this.y += this.speedY; this.angle += this.spin;
                if (this.y > cFlores.height + 50) { this.y = -50; this.x = Math.random() * cFlores.width; }
            }
            draw() {
                ctxF.save();
                ctxF.translate(this.x, this.y); ctxF.rotate(this.angle);
                ctxF.font = ${this.size}px serif; ctxF.textAlign = 'center'; ctxF.textBaseline = 'middle';
                ctxF.fillText(this.type, 0, 0); ctxF.restore();
            }
        }

        // --- BUCLES DE ANIMACIÓN ---
        function animarUniverso() {
            ctxU.clearRect(0, 0, cUniverso.width, cUniverso.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animarUniverso);
        }

        function animarFlores() {
            ctxF.clearRect(0, 0, cFlores.width, cFlores.height);
            if (lluviaActiva) { flores.forEach(f => { f.update(); f.draw(); }); }
            requestAnimationFrame(animarFlores);
        }

        // --- NARRATIVA VISUAL (SIN AUDIO DE VOZ) ---
        const guion = [
            { t: 3000, txt: "A veces tengo ganas de ser cursi para decirle: La amo a usted con locura.", lluvia: false },
            { t: 11000, txt: "A veces tengo ganas de ser tonto para gritar: ¡La quiero tanto!", lluvia: false },
            { t: 19000, txt: "A veces tengo ganas de ser niño para llorar acurrucado en tu seno.", lluvia: false },
            { t: 27000, txt: "A veces tengo ganas de estar muerto para sentir bajo la tierra la humedad...", lluvia: false },
            { t: 35000, txt: "Y que de mis jugos me crezca una flor rompiendo el pecho. Y decir: Esta flor para usted.", lluvia: true }, // AQUÍ EMPIEZA LA LLUVIA
            { t: 45000, txt: "Mayda, admiro tu sacrificio trabajando duro para pagar tu carrera.", lluvia: true },
            { t: 55000, txt: "Hoy sigues luchando por convertirte en lo que sueñas, y quiero que sepas algo...", lluvia: true },
            { t: 65000, txt: "Estamos unidos en esto. No te voy a abandonar nunca, estoy contigo en cada paso.", lluvia: true },
            { t: 75000, txt: "Somos un equipo, mi Norte. Tu Abel estará siempre aquí. Te amo profundamente.", lluvia: true }
        ];

        function secuencia(index) {
            if (index < guion.length) {
                const el = document.getElementById('mensaje-dinamico');
                el.innerText = guion[index].txt;
                el.style.opacity = 1;
                // Activar lluvia de flores si el guion lo dice
                lluviaActiva = guion[index].lluvia; 

                setTimeout(() => {
                    el.style.opacity = 0;
                    setTimeout(() => secuencia(index + 1), 1500);
                }, 7500); 
            } else {
                // Fin de la poesía: Mostrar botón a la Bóveda
                document.getElementById('btn-boveda').style.display = 'inline-block';
            }
        }

        // --- INICIO DE LA SORPRESA ---
        document.getElementById('overlay').onclick = function() {
            this.style.display = 'none';
            document.getElementById('audioFondo').play();
            
            // Inicializar Universo
            for(let i=0; i<300; i++) particles.push(new Particula());
            animarUniverso();
            
            // Inicializar Lluvia de Flores (pero oculta)
            for(let i=0; i<40; i++) flores.push(new Flor());
            animarFlores();

            // Iniciar narrativa visual
            secuencia(0);
        };
    </script>
</body>
</html>
