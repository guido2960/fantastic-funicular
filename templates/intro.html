<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Norte - Mayda</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* Capas de animación: 'pointer-events: none' para que el clic pase a través */
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        #canvas-estrellas { z-index: 1; }
        #canvas-rosas { z-index: 5; }
        
        .capa-cebolla { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, transparent 10%, #050505 90%); 
            z-index: 2; pointer-events: none; 
        }

        .interfaz {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; pointer-events: none;
        }

        #mensaje-dinamico {
            font-size: 1.6rem; text-align: center; width: 85%;
            text-shadow: 0 0 20px #bc13fe, 0 0 10px white;
            opacity: 0; transition: opacity 1.2s ease-in-out;
            line-height: 1.6; font-style: italic; font-weight: bold;
            margin-bottom: 40px;
        }

        /* EL BOTÓN: Estilo de cristal púrpura, siempre arriba */
        #btn-boveda {
            display: none; pointer-events: auto !important;
            padding: 18px 45px; background: rgba(188, 19, 254, 0.8);
            color: white; text-decoration: none; font-weight: bold;
            border-radius: 50px; border: 2px solid #ffffff;
            box-shadow: 0 0 30px #bc13fe; font-size: 1.3rem;
            cursor: pointer; position: relative; z-index: 9999;
            transition: transform 0.3s, background 0.3s;
        }
        #btn-boveda:hover { transform: scale(1.1); background: #bc13fe; }

        .overlay-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; letter-spacing: 5px; font-weight: bold; text-align: center;
        }
    </style>
</head>
<body>

    <div class="overlay-inicio" id="inicio"> [ CLIC PARA LA SORPRESA DE ABEL ] </div>
    <div class="capa-cebolla"></div>
    
    <div class="interfaz">
        <h1 style="color: #bc13fe; letter-spacing: 8px; margin-bottom: 25px; text-shadow: 0 0 15px #bc13fe;">MAYDA: NUESTRO UNIVERSO</h1>
        <p id="mensaje-dinamico"></p>
        <a href="/boveda" id="btn-boveda">ENTRAR A NUESTRA BÓVEDA</a>
    </div>

    <canvas id="canvas-estrellas"></canvas>
    <canvas id="canvas-rosas"></canvas>

    <audio id="musica" loop src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772983408/para_ti_Mayda_xkgwz4.mp3"></audio>

    <script>
        const cEstrellas = document.getElementById('canvas-estrellas');
        const ctxE = cEstrellas.getContext('2d');
        const cRosas = document.getElementById('canvas-rosas');
        const ctxR = cRosas.getContext('2d');

        cEstrellas.width = cRosas.width = window.innerWidth;
        cEstrellas.height = cRosas.height = window.innerHeight;

        let estrellas = [];
        let rosas = [];
        let lluviaActiva = false;

        // --- SISTEMA 1: UNIVERSO ---
        for(let i=0; i<200; i++) {
            estrellas.push({
                x: Math.random()*cEstrellas.width, 
                y: Math.random()*cEstrellas.height, 
                s: Math.random()*2,
                v: Math.random()*0.5 + 0.1
            });
        }

        // --- SISTEMA 2: ROSAS Y CORAZONES ---
        function crearRosa() {
            return {
                x: Math.random() * cRosas.width,
                y: -50,
                s: Math.random() * 20 + 15,
                v: Math.random() * 2 + 1,
                r: Math.random() * 0.1 - 0.05,
                a: 0,
                t: Math.random() > 0.5 ? '🌹' : '💜'
            };
        }

        function animar() {
            // Dibujar Estrellas
            ctxE.clearRect(0,0,cEstrellas.width, cEstrellas.height);
            ctxE.fillStyle = "#bc13fe";
            estrellas.forEach(e => {
                ctxE.beginPath(); ctxE.arc(e.x, e.y, e.s, 0, Math.PI*2); ctxE.fill();
                e.y += e.v; if(e.y > cEstrellas.height) e.y = 0;
            });

            // Dibujar Rosas
            ctxR.clearRect(0,0,cRosas.width, cRosas.height);
            if(lluviaActiva) {
                if(rosas.length < 40 && Math.random() < 0.1) rosas.push(crearRosa());
                rosas.forEach((r, i) => {
                    ctxR.save();
                    ctxR.translate(r.x, r.y);
                    ctxR.rotate(r.a);
                    ctxR.font = ${r.s}px serif;
                    ctxR.fillText(r.t, 0, 0);
                    ctxR.restore();
                    r.y += r.v; r.a += r.r;
                    if(r.y > cRosas.height + 50) rosas.splice(i, 1);
                });
            }
            requestAnimationFrame(animar);
        }

        const guion = [
            { t: "A veces tengo ganas de ser cursi para decirle: La amo con locura.", lluvia: false },
            { t: "Mayda, admiro tu sacrificio en la cevichería para pagar tu carrera.", lluvia: true },
            { t: "Estamos unidos en esto. No te voy a abandonar nunca.", lluvia: true },
            { t: "Somos un equipo, mi Norte. Te amo profundamente. Tu Abel.", lluvia: true }
        ];

        function mostrarPoesia(i) {
            const p = document.getElementById('mensaje-dinamico');
            if(i < guion.length) {
                p.innerText = guion[i].t;
                p.style.opacity = 1;
                lluviaActiva = guion[i].lluvia;
                setTimeout(() => {
                    p.style.opacity = 0;
                    setTimeout(() => mostrarPoesia(i+1), 1500);
                }, 7000);
            } else {
                document.getElementById('btn-boveda').style.display = "inline-block";
            }
        }

        document.getElementById('inicio').onclick = function() {
            this.style.display = "none";
            document.getElementById('musica').play();
            animar();
            mostrarPoesia(0);
        };
    </script>
</body>
</html>
