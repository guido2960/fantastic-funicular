<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Norte - Mayda</title>
    <style>
        /* 1. Fondo y Base */
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* 2. Animaciones (Fantasmas: no bloquean el clic) */
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .capa-cebolla { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, #050505 85%); z-index: 2; pointer-events: none; }

        /* 3. Contenedor de Texto y Botón (Z-index alto para que esté ARRIBA de todo) */
        .interfaz {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 9999; width: 90%; pointer-events: none; 
        }

        #mensaje-dinamico {
            font-size: 1.5rem; text-shadow: 0 0 15px #bc13fe; opacity: 0;
            transition: opacity 1s ease-in-out; line-height: 1.6; font-style: italic;
            margin-bottom: 40px; pointer-events: none;
        }

        /* 4. EL BOTÓN (Blindado para que funcione Sí o Sí) */
        #btn-boveda {
            display: none; /* Se activa al final */
            pointer-events: auto !important; /* FORZA EL CLIC */
            background: #bc13fe; color: white; text-decoration: none;
            padding: 18px 45px; font-weight: bold; border-radius: 50px;
            box-shadow: 0 0 30px #bc13fe; border: 2px solid white;
            font-size: 1.3rem; cursor: pointer; position: relative;
        }

        /* Pantalla de inicio para activar música */
        .overlay-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; letter-spacing: 3px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="overlay-inicio" id="inicio">[ CLIC PARA LA SORPRESA DE ABEL ]</div>
    <div class="capa-cebolla"></div>
    
    <div class="interfaz">
        <h1 style="color: #bc13fe; letter-spacing: 5px; margin-bottom: 25px;">MAYDA: MI NORTE</h1>
        <p id="mensaje-dinamico"></p>
        <a href="/boveda" id="btn-boveda">ENTRAR A NUESTRA BÓVEDA</a>
    </div>

    <canvas id="universo"></canvas>
    <audio id="musica" loop src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772983408/para_ti_Mayda_xkgwz4.mp3"></audio>

    <script>
        const canvas = document.getElementById('universo');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let stars = [];
        for(let i=0; i<150; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, a: Math.random()});

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            stars.forEach(s => {
                ctx.globalAlpha = s.a; ctx.fillStyle = "#bc13fe";
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y += 0.3; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(draw);
        }

        const poesia = [
            "A veces tengo ganas de ser cursi para decirle: La amo a usted con locura.",
            "Mayda, admiro tu sacrificio en la cevichería para pagar tu carrera.",
            "Hoy sigues luchando por tus sueños, y quiero que sepas algo...",
            "Estamos unidos en esto. No te voy a abandonar nunca.",
            "Somos un equipo, mi Norte. Te amo profundamente. Tu Abel."
        ];

        function mostrarPoesia(i) {
            const p = document.getElementById('mensaje-dinamico');
            if(i < poesia.length) {
                p.innerText = poesia[i];
                p.style.opacity = 1;
                setTimeout(() => {
                    p.style.opacity = 0;
                    setTimeout(() => mostrarPoesia(i+1), 1200);
                }, 6000);
            } else {
                // AQUÍ SE ACTIVA EL BOTÓN FINAL
                document.getElementById('btn-boveda').style.display = "inline-block";
            }
        }

        document.getElementById('inicio').onclick = function() {
            this.style.display = "none";
            document.getElementById('musica').play();
            draw();
            mostrarPoesia(0);
        };
    </script>
</body>
</html>
