<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestro Universo - Abel & Mayda</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #canvasUniverso { position: absolute; top: 0; left: 0; }
        #interfaz { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        #texto-emocional { 
            font-size: 24px; text-align: center; text-shadow: 0 0 15px #ff4d94; 
            padding: 40px; font-weight: bold; max-width: 75%; line-height: 1.6;
        }
        #pantalla-inicio { position: fixed; width: 100%; height: 100%; background: black; z-index: 100; display: flex; justify-content: center; align-items: center; }
        #btn-entrar { padding: 15px 35px; font-size: 20px; cursor: pointer; background: transparent; border: 2px solid #ff4d94; color: white; border-radius: 30px; box-shadow: 0 0 15px #ff4d94; transition: 0.5s; }
        #btn-entrar:hover { background: #ff4d94; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="pantalla-inicio">
    <button id="btn-entrar" onclick="iniciarHistoria()">Entrar a nuestro universo</button>
</div>

<div id="interfaz"><div id="texto-emocional"></div></div>
<canvas id="canvasUniverso"></canvas>

<audio id="musicaFondo" loop preload="auto"><source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a" type="audio/mp4"></audio>
<audio id="audioVoz" preload="auto"><source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4" type="audio/mp4"></audio>

<script>
    const canvas = document.getElementById('canvasUniverso');
    const ctx = canvas.getContext('2d');
    const textoDiv = document.getElementById('texto-emocional');
    const musica = document.getElementById('musicaFondo');
    const voz = document.getElementById('audioVoz');
    
    let particulas = [];
    let estrellasFijas = []; 
    let fase = "paz"; 
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    for(let i=0; i<400; i++) {
        estrellasFijas.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            z: Math.random() * canvas.width,
            opacidad: Math.random()
        });
    }

    class Particula {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = -Math.random() * 0.5;
            this.color = "white";
            this.tamaño = Math.random() * 1.5;
            this.opacidad = Math.random();
            this.objetivoX = null;
            this.objetivoY = null;
        }
        actualizar() {
            if (["arbol", "avion", "edificio", "corazon"].includes(fase)) {
                this.x += (this.objetivoX - this.x) * 0.08;
                this.y += (this.objetivoY - this.y) * 0.08;
            } else {
                this.y += this.vy;
                if (this.y < 0) this.y = canvas.height;
            }
        }
        dibujar() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.tamaño, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.opacidad;
            ctx.fill();
        }
    }

    for (let i = 0; i < 1500; i++) particulas.push(new Particula());

    // FUNCIÓN DE ESCRITURA MEJORADA (Ahora devuelve una "promesa" para sincronizar)
    function escribir(txt, callback) {
        let i = 0; textoDiv.innerHTML = "";
        const intervalId = setInterval(() => {
            if(i < txt.length) { textoDiv.innerHTML += txt.charAt(i); i++; }
            else { 
                clearInterval(intervalId); 
                if(callback) setTimeout(callback, 2500); // Espera 2.5 seg para que lea y cambia de imagen
            }
        }, 70);
    }

    function formarFigura(tipo) {
        fase = tipo;
        particulas.forEach((p, i) => {
            const t = i / particulas.length * Math.PI * 2;
            if (tipo === "arbol") {
                p.color = "#4CAF50";
                if (i < 800) { p.objetivoX = canvas.width/2 + Math.cos(i)*150 * Math.random(); p.objetivoY = canvas.height/2 - 50 - Math.random()*150; }
                else { p.objetivoX = canvas.width/2 + (i%15 - 7); p.objetivoY = canvas.height/2 + (i%120); }
            } else if (tipo === "avion") {
                p.color = "#87CEEB";
                if (i < 700) { p.objetivoX = canvas.width/2 + (Math.cos(i)*250); p.objetivoY = canvas.height/2 + (i%2===0?5:-5); }
                else { p.objetivoX = canvas.width/2 + (i-1000)*2.5; p.objetivoY = canvas.height/2; }
            } else if (tipo === "edificio") {
                p.color = "#FFD700";
                p.objetivoX = canvas.width/2 + (i%35 * 15) - 250;
                p.objetivoY = canvas.height/2 + (Math.floor(i/35) * -8) + 100;
            } else if (tipo === "corazon") {
                p.color = "#ff4d94";
                p.objetivoX = canvas.width/2 + 180 * Math.pow(Math.sin(t), 3);
                p.objetivoY = canvas.height/2 - (150 * Math.cos(t) - 60 * Math.cos(2*t) - 30 * Math.cos(3*t) - 10 * Math.cos(4*t));
            }
        });
    }

    function iniciarHistoria() {
        // Al hacer clic, desbloqueamos los audios
        document.getElementById('pantalla-inicio').style.display = 'none';
        musica.play().catch(e => console.log("Error musica:", e));
        musica.volume = 0.3;

        // SECUENCIA SINCRONIZADA (Ya no depende de tiempos fijos locos)
        escribir("Todo comenzó con esta paz que me diste, mi Administradora favorita.", () => {
            formarFigura("arbol");
            escribir("Entender tus capas me tomó tiempo, pero cada una de ellas vale la pena.", () => {
                formarFigura("avion");
                escribir("Admiro tu fuerza en Modo Acción... por eso mi vida siempre vuela hacia tu Norte.", () => {
                    formarFigura("edificio");
                    escribir("Eres una Administradora brillante. Admiro tu visión y quiero construir un imperio a tu lado.", () => {
                        fase = "paz";
                        escribir("Tomo tan en serio cada mensaje que me mandas... me encanta cómo te expresas.", () => {
                            formarFigura("corazon");
                            musica.volume = 0.1; 
                            voz.play().catch(e => console.log("Error voz:", e));
                            escribir("Escucha esto que tengo guardado solo para ti...", () => {
                                escribir("👩‍❤️‍💋‍👨 TE AMO PARA SIEMPRE, MAYDA 👩‍❤️‍💋‍👨", () => {
                                    setTimeout(() => { 
                                        document.body.style.transition = "opacity 5s"; 
                                        document.body.style.opacity = "0"; 
                                        setTimeout(() => { window.location.href = "/boveda"; }, 5000); 
                                    }, 8000);
                                });
                            });
                        });
                    });
                });
            });
        });
    }

    function animar() {
        // EFECTO DE RASTRO (Hace que se vea fluido como el video)
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        estrellasFijas.forEach(ef => {
            ef.z -= 0.5; if (ef.z <= 0) ef.z = canvas.width;
            let x = (ef.x - canvas.width/2) * (canvas.width/ef.z) + canvas.width/2;
            let y = (ef.y - canvas.height/2) * (canvas.width/ef.z) + canvas.height/2;
            let s = (1 - ef.z/canvas.width) * 2;
            ctx.fillStyle = "white"; ctx.globalAlpha = ef.opacidad;
            ctx.fillRect(x, y, s, s);
        });

        particulas.forEach(p => { p.actualizar(); p.dibujar(); });
        requestAnimationFrame(animar);
    }
    animar();
</script>
</body>
</html>
