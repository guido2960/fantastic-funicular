<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestra Historia - Abel y Mayda</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #canvasUniverso { position: absolute; top: 0; left: 0; }
        #interfaz { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #texto-emocional { font-size: 26px; text-align: center; text-shadow: 0 0 20px #ff4d94; padding: 25px; font-weight: bold; max-width: 80%; line-height: 1.4; }
        #pantalla-inicio { position: fixed; width: 100%; height: 100%; background: black; z-index: 100; display: flex; justify-content: center; align-items: center; pointer-events: all; }
        #btn-entrar { padding: 20px 45px; font-size: 24px; cursor: pointer; background: transparent; border: 2px solid #ff4d94; color: white; border-radius: 50px; box-shadow: 0 0 20px #ff4d94; transition: 0.4s; }
        #btn-entrar:hover { background: #ff4d94; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="pantalla-inicio">
    <button id="btn-entrar" onclick="iniciarHistoria()">Ver nuestra historia</button>
</div>

<div id="interfaz"><div id="texto-emocional"></div></div>
<canvas id="canvasUniverso"></canvas>

<audio id="musicaFondo" loop src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a"></audio>
<audio id="audioVoz" src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4"></audio>

<script>
    const canvas = document.getElementById('canvasUniverso');
    const ctx = canvas.getContext('2d');
    const textoDiv = document.getElementById('texto-emocional');
    const musica = document.getElementById('musicaFondo');
    const voz = document.getElementById('audioVoz');
    
    let particulas = [];
    let estrellasCine = []; 
    let fase = "paz"; 
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Fondo Dinámico
    for(let i=0; i<400; i++) {
        estrellasCine.push({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            z: Math.random() * canvas.width, opacidad: Math.random()
        });
    }

    class Particula {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = -(Math.random() * 1 + 0.5); 
            this.color = "white";
            this.tamaño = Math.random() * 2;
            this.opacidad = 1;
        }
        actualizar() {
            if (["edificio", "arbol", "corazon"].includes(fase)) {
                let elasticidad = 0.08;
                this.x += (this.objetivoX - this.x) * elasticidad;
                this.y += (this.objetivoY - this.y) * elasticidad;
                // Efecto latido si es corazón
                if(fase === "corazon") {
                    this.x += Math.sin(Date.now() * 0.005) * 0.5;
                }
            } else if (fase === "petalos") {
                this.y += 1.5;
                this.x += Math.sin(this.y * 0.03) * 2;
                this.color = "#ffb7c5";
                if (this.y > canvas.height) this.y = -10;
            } else {
                this.y += this.vy;
                if (this.y < 0) this.y = canvas.height;
            }
        }
        dibujar() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.tamaño, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.globalAlpha = this.opacidad; ctx.fill();
        }
    }

    for (let i = 0; i < 1000; i++) particulas.push(new Particula());

    function escribir(txt, callback) {
        let i = 0; textoDiv.innerHTML = "";
        const intervalId = setInterval(() => {
            if(i < txt.length) { textoDiv.innerHTML += txt.charAt(i); i++; }
            else { clearInterval(intervalId); if(callback) setTimeout(callback, 1500); }
        }, 60); 
    }

    function formarFigura(tipo) {
        fase = tipo;
        particulas.forEach((p, i) => {
            const t = i / particulas.length * Math.PI * 2;
            if (tipo === "edificio") {
                p.color = "#FFD700";
                p.objetivoX = (canvas.width/2 - 150) + (i % 12 * 25);
                p.objetivoY = (canvas.height - 100) - (Math.floor(i / 12) * 6);
            } else if (tipo === "arbol") {
                p.color = "#4CAF50";
                if (i < 400) { p.objetivoX = canvas.width/2; p.objetivoY = canvas.height/2 + (i%200); }
                else { p.objetivoX = canvas.width/2 + Math.cos(t)*170; p.objetivoY = canvas.height/2 - 90 + Math.sin(t)*140; }
            } else if (tipo === "corazon") {
                p.color = "#ff4d94";
                p.objetivoX = canvas.width/2 + 180 * Math.pow(Math.sin(t), 3);
                p.objetivoY = canvas.height/2 - (150 * Math.cos(t) - 60 * Math.cos(2*t) - 30 * Math.cos(3*t));
            }
        });
    }

    function iniciarHistoria() {
        document.getElementById('pantalla-inicio').style.display = 'none';
        musica.volume = 0.3; musica.play();

        escribir("Todo comenzó con esta paz que me diste, mi Administradora...", () => {
            formarFigura("edificio");
            escribir("Admiro tu fuerza en Modo Acción y tu visión brillante. Quiero construir un imperio a tu lado.", () => {
                formarFigura("arbol");
                escribir("Entendí cada una de tus capas y valoré cada silencio, porque eres mi tesoro.", () => {
                    formarFigura("corazon");
                    escribir("Daría todo por un beso, pero amo más respetar tu ritmo. Eres el amor de mi vida.", () => {
                        musica.volume = 0.1; voz.play();
                        escribir("Escucha esto que grabé solo para ti...", () => {
                            setTimeout(() => {
                                fase = "petalos";
                                escribir("👩‍❤️‍💋‍👨 TE AMO PARA SIEMPRE, MAYDA 👩‍❤️‍💋‍👨");
                                setTimeout(() => {
                                    document.body.style.transition = "opacity 5s";
                                    document.body.style.opacity = "0";
                                    setTimeout(() => { window.location.href = "/boveda"; }, 5000);
                                }, 15000);
                            }, 8000);
                        });
                    });
                });
            });
        });
    }

    function animar() {
        ctx.fillStyle = "black"; ctx.fillRect(0,0, canvas.width, canvas.height);
        estrellasCine.forEach(ef => {
            ef.z -= 1.5; if (ef.z <= 0) ef.z = canvas.width;
            let x = (ef.x - canvas.width/2) * (canvas.width/ef.z) + canvas.width/2;
            let y = (ef.y - canvas.height/2) * (canvas.width/ef.z) + canvas.height/2;
            let s = (1 - ef.z/canvas.width) * 2;
            ctx.fillStyle = "white"; ctx.globalAlpha = ef.opacidad; ctx.fillRect(x, y, s, s);
        });
        particulas.forEach(p => { p.actualizar(); p.dibujar(); });
        requestAnimationFrame(animar);
    }
    animar();
</script>
</body>
</html>
