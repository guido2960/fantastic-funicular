<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Administradora</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; z-index: 100; transition: opacity 1s;
        }
        button {
            padding: 15px 40px; font-size: 18px; cursor: pointer;
            background: transparent; color: #fff; border: 2px solid #fff;
            border-radius: 50px; transition: 0.5s; text-transform: uppercase; letter-spacing: 2px;
        }
        button:hover { background: #fff; color: #000; box-shadow: 0 0 30px #fff; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btnEntrar">Entrar a nuestro universo</button>
    </div>

    <canvas id="canvas"></canvas>

    <audio id="musicaFondo" src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a" preload="auto" loop></audio>
    <audio id="miVoz" src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btnEntrar');
        const overlay = document.getElementById('overlay');
        const musica = document.getElementById('musicaFondo');
        const voz = document.getElementById('miVoz');

        let estrellas = [];
        let mensajeMostrado = "";
        let modoMagia = "normal"; 
        let animando = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // CONTROLADOR DEL CLIC (LA LLAVE)
        btn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);
            musica.volume = 0.4;
            musica.play();
            animando = true;
            crearEstrellas();
            update();
            iniciarTimeline();
        });

        function iniciarTimeline() {
            // PASO 1 y 2: Saludo (5s)
            setTimeout(() => escribirTexto("Hola mi administradora favorita...", 0), 5000);

            // PASO 3: Capas (20s)
            setTimeout(() => escribirTexto("Gracias por ser mi paz.\nAmo conocer cada capa de ti.", 0), 20000);

            // PASO 4: TU VOZ Y FUEGOS (45s)
            setTimeout(() => {
                mensajeMostrado = ""; 
                musica.volume = 0.1;
                voz.play();
                modoMagia = "fuego"; 
            }, 45000);

            // PASO 5: ABRAZO (55s)
            setTimeout(() => {
                modoMagia = "abrazo";
                mensajeMostrado = "👨‍💻       👩‍💼"; 
                setTimeout(() => { mensajeMostrado = "🫂\nNuestra Unión"; }, 2000);
            }, 55000);

            // PASO 6: EL BESO (58s)
            setTimeout(() => {
                mensajeMostrado = "👩‍❤️‍💋‍👨\nTe amo, May";
            }, 58000);

            // FINAL: SALTO A BÓVEDA (62s)
            setTimeout(() => {
                window.location.href = "/boveda";
            }, 62000);
        }

        function escribirTexto(texto, index) {
            if (index === 0) mensajeMostrado = "";
            if (index < texto.length) {
                mensajeMostrado += texto.charAt(index);
                setTimeout(() => escribirTexto(texto, index + 1), 70);
            }
        }

        function crearEstrellas() {
            for(let i=0; i<250; i++) {
                const t = (i / 250) * 2 * Math.PI;
                estrellas.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    tx: (16 * Math.sin(t) ** 3) * 12 + canvas.width/2,
                    ty: (- (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))) * 12 + canvas.height/2,
                    r: Math.random() * 2,
                    color: 'white'
                });
            }
        }

        function update() {
            if(!animando) return;
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            estrellas.forEach(e => {
                if (modoMagia === "normal") {
                    e.y -= 0.5; if(e.y < 0) e.y = canvas.height;
                } else if (modoMagia === "fuego") {
                    e.x += e.vx; e.y += e.vy;
                    e.color = hsl(${Math.random() * 360}, 100%, 70%);
                } else if (modoMagia === "abrazo") {
                    e.x += (e.tx - e.x) * 0.05; e.y += (e.ty - e.y) * 0.05;
                    e.color = "#ff4d6d";
                }
                ctx.fillStyle = e.color;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
            });

            if(mensajeMostrado) {
                ctx.fillStyle = "white";
                ctx.font = "20px 'Courier New'";
                ctx.textAlign = "center";
                const lineas = mensajeMostrado.split('\n');
                lineas.forEach((l, i) => ctx.fillText(l, canvas.width/2, (canvas.height/2) + (i*50)));
            }
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
