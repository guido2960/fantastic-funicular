<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi Administradora</title>
    <style>
        body { margin: 0; background: black; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #canvasUniverso { position: absolute; top: 0; left: 0; }
        #interfaz { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #texto-emocional { font-size: 26px; text-align: center; text-shadow: 0 0 15px #ff4d94; padding: 20px; }
        #pantalla-inicio { position: fixed; width: 100%; height: 100%; background: black; z-index: 100; display: flex; justify-content: center; align-items: center; pointer-events: all; }
        #btn-entrar { padding: 20px 40px; font-size: 22px; cursor: pointer; background: #ff4d94; border: none; color: white; border-radius: 50px; box-shadow: 0 0 25px #ff4d94; transition: 0.3s; }
    </style>
</head>
<body>

<div id="pantalla-inicio">
    <button id="btn-entrar" onclick="iniciarHistoria()">Entrar a nuestra historia</button>
</div>

<div id="interfaz">
    <div id="texto-emocional"></div>
</div>

<canvas id="canvasUniverso"></canvas>

<audio id="musicaFondo" loop preload="auto">
    <source src="{{ url_for('static', filename='musica_fondo.mp3') }}" type="audio/mpeg">
</audio>
<audio id="audioVoz" preload="auto">
    <source src="{{ url_for('static', filename='mi_voz.mp3') }}" type="audio/mpeg">
</audio>

<script>
    const canvas = document.getElementById('canvasUniverso');
    const ctx = canvas.getContext('2d');
    const textoDiv = document.getElementById('texto-emocional');
    const musica = document.getElementById('musicaFondo');
    const voz = document.getElementById('audioVoz');
    
    let particulas = [];
    let fase = "paz"; 
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Particula {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 2.5;
            this.vy = -Math.random() * 1.5;
            this.color = "white";
            this.tamaño = Math.random() * 2 + 1;
            this.opacidad = 1;
            this.objetivoX = null;
            this.objetivoY = null;
        }
        actualizar() {
            if (fase === "paz") {
                this.y += this.vy;
                if (this.y < 0) this.y = canvas.height;
            } else if (fase === "avion" || fase === "corazon") {
                this.x += (this.objetivoX - this.x) * 0.05;
                this.y += (this.objetivoY - this.y) * 0.05;
            } else if (fase === "fuegos") {
                this.x += this.vx * 7;
                this.y += this.vy * 7;
                this.opacidad -= 0.02;
            } else if (fase === "petalos") {
                this.y += 1.5;
                this.x += Math.sin(this.y * 0.02) * 1.5;
                this.color = "rgba(255, 182, 193, " + this.opacidad + ")";
                if (this.y > canvas.height) { this.y = -10; this.opacidad = Math.random(); }
                this.opacidad -= 0.001;
            }
        }
        dibujar() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.tamaño, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.globalAlpha = Math.max(0, this.opacidad);
            ctx.fill();
        }
    }

    for (let i = 0; i < 600; i++) particulas.push(new Particula());

    function escribir(txt) {
        let i = 0; textoDiv.innerHTML = "";
        const t = setInterval(() => {
            if(i < txt.length) { textoDiv.innerHTML += txt.charAt(i); i++; }
            else clearInterval(t);
        }, 70);
    }

    function formarFigura(tipo) {
        fase = tipo;
        particulas.forEach((p, i) => {
            const t = i / particulas.length * Math.PI * 2;
            if (tipo === "corazon") {
                p.color = "#ff4d94";
                p.objetivoX = canvas.width/2 + 160 * Math.pow(Math.sin(t), 3);
                p.objetivoY = canvas.height/2 - (130 * Math.cos(t) - 50 * Math.cos(2*t) - 20 * Math.cos(3*t) - 10 * Math.cos(4*t));
            } else if (tipo === "avion") {
                p.color = "#87CEEB";
                p.objetivoX = canvas.width/2 + (i%40 * 12) - 240;
                p.objetivoY = canvas.height/2 + (Math.sin(i)*15);
            }
        });
    }

    function iniciarHistoria() {
        document.getElementById('pantalla-inicio').style.display = 'none';
        
        // REPRODUCCIÓN FORZADA
        musica.volume = 0.2;
        musica.play().catch(e => console.log("Revisar nombre de musica_fondo.mp3"));

        escribir("Todo comenzó con esta paz que me diste...");

        setTimeout(() => escribir("Me permitiste conocer cada capa de tu alma..."), 10000);

        setTimeout(() => {
            formarFigura("avion");
            escribir("Y empezamos a volar hacia un mismo norte.");
        }, 25000);

        setTimeout(() => {
            formarFigura("corazon");
            musica.volume = 0.05; 
            voz.play().catch(e => console.log("Revisar nombre de mi_voz.mp3"));
            escribir("Escucha esto que tengo para ti...");
        }, 45000);

        setTimeout(() => escribir("Eres el amor de mi vida, May."), 55000);

        setTimeout(() => {
            fase = "fuegos";
            escribir("👩‍❤️‍💋‍👨 TE AMO 👩‍❤️‍💋‍👨");
            setTimeout(() => {
                fase = "petalos";
                particulas.forEach(p => { p.opacidad = 1; p.tamaño = 3; });
            }, 3000);
            setTimeout(() => {
                document.body.style.transition = "opacity 2s";
                document.body.style.opacity = "0";
                setTimeout(() => { window.location.href = "/boveda"; }, 2000);
            }, 9000);
        }, 65000);
    }

    function animar() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particulas.forEach(p => { p.actualizar(); p.dibujar(); });
        requestAnimationFrame(animar);
    }
    animar();
</script>
</body>
</html>
