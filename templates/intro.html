<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Universo - Abel & Mayda</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; }
        #interfaz { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        #texto-emocional { 
            font-size: 24px; text-align: center; text-shadow: 0 0 15px #ff4d94, 0 0 5px #fff; 
            padding: 40px; font-weight: bold; max-width: 80%; line-height: 1.6;
        }
        #pantalla-inicio { position: fixed; width: 100%; height: 100%; background: black; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #btn-entrar { 
            padding: 18px 45px; font-size: 20px; cursor: pointer; background: transparent; 
            border: 2px solid #ff4d94; color: white; border-radius: 50px; 
            box-shadow: 0 0 20px #ff4d94; transition: 0.5s; letter-spacing: 3px;
        }
        #btn-entrar:hover { background: #ff4d94; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="pantalla-inicio">
    <button id="btn-entrar" onclick="iniciarHistoria()">ENTRAR AL UNIVERSO</button>
</div>

<div id="interfaz"><div id="texto-emocional"></div></div>
<canvas id="canvasUniverso"></canvas>

<audio id="musicaFondo" loop preload="auto"><source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a" type="audio/mp4"></audio>
<audio id="audioVoz" preload="auto"><source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4" type="audio/mp4"></audio>

<script>
    const canvas = document.getElementById('canvasUniverso');
    const ctx = canvas.getContext('2d');
    const textoDiv = document.getElementById('texto-emocional');
    const musica = document.getElementById('musicaFondo');
    const voz = document.getElementById('audioVoz');
    
    let particulas = [], estrellasCine = [], fase = "paz";
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Fondo cinematográfico del código que te gusta
    for(let i=0; i<400; i++) {
        estrellasCine.push({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            z: Math.random() * canvas.width, opacidad: Math.random()
        });
    }

    class Particula {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.targetX = this.x; this.targetY = this.y;
            this.color = "255, 255, 255";
            this.size = Math.random() * 2 + 0.5;
            this.speed = 0.07;
        }
        update() {
            if (fase === "paz") {
                this.y -= 0.6; if (this.y < 0) this.y = canvas.height;
            } else {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = rgb(${this.color});
            ctx.fill();
        }
    }

    for (let i = 0; i < 2000; i++) particulas.push(new Particula());

    // Sincronización de tecleo y figuras
    function escribir(txt, callback) {
        let i = 0; textoDiv.innerHTML = "";
        const intervalId = setInterval(() => {
            if(i < txt.length) { textoDiv.innerHTML += txt.charAt(i); i++; }
            else { clearInterval(intervalId); if(callback) setTimeout(callback, 2800); }
        }, 65);
    }

    function formarFigura(tipo) {
        fase = tipo;
        particulas.forEach((p, i) => {
            const ang = (i / particulas.length) * Math.PI * 2;
            if (tipo === "arbol") {
                p.color = "100, 255, 100";
                if (i < 900) { p.targetX = canvas.width/2 + Math.cos(i)*160 * Math.random(); p.targetY = canvas.height/2 - 60 - Math.random()*200; }
                else { p.targetX = canvas.width/2 + (i%20 - 10); p.targetY = canvas.height/2 + (i%150); }
            } else if (tipo === "avion") {
                p.color = "135, 206, 235";
                if (i < 800) { p.targetX = canvas.width/2 + (Math.cos(i)*350); p.targetY = canvas.height/2 + (i%2===0?8:-8); }
                else { p.targetX = canvas.width/2 + (i-1200)*4; p.targetY = canvas.height/2; }
            } else if (tipo === "edificio") {
                p.color = "255, 215, 0";
                p.targetX = (canvas.width/2 - 250) + (i % 30 * 16);
                p.targetY = (canvas.height - 150) - (Math.floor(i / 30) * 7);
            } else if (tipo === "corazon") {
                p.color = "255, 77, 148";
                p.targetX = canvas.width/2 + 250 * Math.pow(Math.sin(ang), 3);
                p.targetY = canvas.height/2 - (200 * Math.cos(ang) - 80 * Math.cos(2*ang) - 40 * Math.cos(3*ang) - 15 * Math.cos(4*ang));
            }
        });
    }

    function iniciarHistoria() {
        document.getElementById('pantalla-inicio').style.display = 'none';
        musica.volume = 0.3; 
        musica.play().catch(e => console.log("Audio bloqueado"));

        escribir("Todo comenzó con esta paz que me diste, mi Administradora favorita.", () => {
            formarFigura("arbol");
            escribir("Me tomó tiempo entender cada capa de tu alma, pero cada una vale la pena.", () => {
                formarFigura("avion");
                escribir("Admiro tu fuerza en Modo Acción... por eso mi vida siempre vuela hacia tu Norte.", () => {
                    formarFigura("edificio");
                    escribir("Eres una Administradora brillante. Admiro tu visión y quiero construir un imperio a tu lado.", () => {
                        fase = "paz";
                        escribir("Tomo tan en serio cada mensaje que me mandas... me encanta cómo eres.", () => {
                            formarFigura("corazon");
                            musica.volume = 0.12; 
                            voz.play().catch(e => console.log("Voz bloqueada"));
                            escribir("Escucha esto que guardé solo para ti...", () => {
                                escribir("👩‍❤️‍💋‍👨 TE AMO PARA SIEMPRE, MAYDA 👩‍❤️‍💋‍👨", () => {
                                    setTimeout(() => { 
                                        document.body.style.transition = "opacity 6s"; 
                                        document.body.style.opacity = "0"; 
                                        setTimeout(() => { window.location.href = "/boveda"; }, 6000); 
                                    }, 15000);
                                });
                            });
                        });
                    });
                });
            });
        });
    }

    function animar() {
        // Estela de luz (Trail) para el efecto video
        ctx.fillStyle = "rgba(0, 0, 0, 0.08)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = "lighter";

        estrellasCine.forEach(ef => {
            ef.z -= 0.6; if (ef.z <= 0) ef.z = canvas.width;
            let x = (ef.x - canvas.width/2) * (canvas.width/ef.z) + canvas.width/2;
            let y = (ef.y - canvas.height/2) * (canvas.width/ef.z) + canvas.height/2;
            let s = (1 - ef.z/canvas.width) * 1.5;
            ctx.fillStyle = "white"; ctx.globalAlpha = ef.opacidad * 0.5; ctx.fillRect(x, y, s, s);
        });

        particulas.forEach(p => { p.update(); p.draw(); });
        ctx.globalCompositeOperation = "source-over";
        requestAnimationFrame(animar);
    }
    animar();
</script>
</body>
</html>
