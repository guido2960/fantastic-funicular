<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi Norte</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        #texto-guion {
            position: absolute; bottom: 15%; width: 100%; text-align: center;
            color: white; font-size: 26px; font-style: italic;
            text-shadow: 0 0 15px rgba(255,255,255,0.7);
            transition: opacity 2s; opacity: 0; z-index: 10;
        }
        #btn-iniciar {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 20px; cursor: pointer; background: white; border: none; border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="pantalla-inicio">
        <button id="btn-iniciar" onclick="iniciarHistoria()">Entrar al universo de Mayda</button>
    </div>
    
    <div id="texto-guion"></div>
    <canvas id="canvas"></canvas>

    <audio id="musica-fondo" src="/static/musica.mp3" loop></audio>
    <audio id="voz-abel" src="/static/voz.mp3"></audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const textoDiv = document.getElementById('texto-guion');
        const musica = document.getElementById('musica-fondo');
        const voz = document.getElementById('voz-abel');
        let particulas = [];
        let fase = "paz";

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particula {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.objetivoX = this.x;
                this.objetivoY = this.y;
                this.color = "#ffffff";
                this.tamaño = Math.random() * 2;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.velocidadVuelo = 0.3 + Math.random() * 0.6;
            }
            actualizar() {
                if (fase === "celebracion") {
                    this.x += this.vx * 2.5; this.y += this.vy * 2.5;
                } else if (fase === "paz" || fase === "avion") {
                    this.x -= this.velocidadVuelo;
                    if (this.x < 0) this.x = canvas.width;
                    this.x += (this.objetivoX - this.x) * 0.05;
                    this.y += (this.objetivoY - this.y) * 0.05;
                } else {
                    this.x += (this.objetivoX - this.x) * 0.05;
                    this.y += (this.objetivoY - this.y) * 0.05;
                }
            }
            dibujar() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.tamaño, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<1200; i++) particulas.push(new Particula());

        function escribir(txt) {
            textoDiv.style.opacity = 0;
            setTimeout(() => {
                textoDiv.innerHTML = txt;
                textoDiv.style.opacity = 1;
            }, 1000);
        }

        function formarFigura(tipo) {
            fase = tipo;
            particulas.forEach((p, i) => {
                if (tipo === "arbol") { 
                    p.color = "#4CAF50"; 
                    if (i < 400) { 
                        p.objetivoX = canvas.width/2 + (Math.random()-0.5)*30;
                        p.objetivoY = canvas.height/2 + (i%200);
                    } else { 
                        let a = Math.random()*Math.PI*2; let r = Math.random()*160;
                        p.objetivoX = canvas.width/2 + Math.cos(a)*r;
                        p.objetivoY = canvas.height/2 - 60 + Math.sin(a)*r;
                    }
                }
                else if (tipo === "avion") { 
                    p.color = "#87CEEB"; 
                    p.objetivoX = (i % 60) * 8 + (canvas.width/4);
                    p.objetivoY = canvas.height/2 + Math.sin(i)*15;
                }
                else if (tipo === "imperio") { 
                    const colores = ["#FFD700", "#00BFFF", "#32CD32", "#FF4500", "#C0C0C0"];
                    let edif = i % 5; p.color = colores[edif];
                    let base = (edif + 1) * (canvas.width/6);
                    p.objetivoX = base + (Math.random()*50 - 25);
                    p.objetivoY = canvas.height - (Math.random()*(canvas.height*0.55));
                }
                else if (tipo === "corazon") {
                    p.color = "#ff3366";
                    let t = Math.random()*Math.PI*2;
                    p.objetivoX = canvas.width/2 + 150*Math.pow(Math.sin(t),3);
                    p.objetivoY = canvas.height/2 - (120*Math.cos(t) - 45*Math.cos(2*t) - 18*Math.cos(3*t));
                }
            });
        }

        function granFinal() {
            fase = "celebracion";
            particulas.forEach((p, i) => {
                p.color = i % 2 === 0 ? "#ff4d94" : ["#FFD700", "#FFFFFF", "#00BFFF"][i%3];
                let ang = Math.random()*Math.PI*2; let vel = 7 + Math.random()*9;
                p.vx = Math.cos(ang)*vel; p.vy = Math.sin(ang)*vel;
                p.x = canvas.width/2; p.y = canvas.height/2;
            });
        }

        function animar() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particulas.forEach(p => { p.actualizar(); p.dibujar(); });
            requestAnimationFrame(animar);
        }

        function iniciarHistoria() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            musica.volume = 0.3;
            musica.play();
            animar();
            
            // --- CRONOLOGÍA ---
            escribir("Todo comenzó con esta paz que me diste, mi Administradora."); 

            setTimeout(() => { formarFigura("arbol"); escribir("Me tomó tiempo entender cada capa de tu alma, pero cada una vale la pena."); }, 30000);
            setTimeout(() => { formarFigura("avion"); escribir("Admiro tu fuerza en Modo Acción... por eso mi vida vuela hacia tu Norte."); }, 60000);
            setTimeout(() => { formarFigura("imperio"); escribir("Eres una Administradora brillante. Admiro tu visión y quiero ser tu socio de vida."); }, 90000);
            setTimeout(() => { fase = "paz"; escribir("Tomo tan en serio cada video y mensaje que me mandas... me encanta escucharte."); }, 120000);
            setTimeout(() => { particulas.forEach(p => p.color = "#ffffff"); escribir("Me encantaría darte ese primer beso... pero amo aún más respetar tu ritmo."); }, 155000);
            
            setTimeout(() => { 
                formarFigura("corazon"); 
                escribir("Escucha esto que tengo guardado solo para ti...");
                musica.volume = 0.1; 
                voz.play(); // AQUÍ ENTRA TU VOZ
            }, 175000);

            setTimeout(() => { granFinal(); escribir("👩‍❤️‍💋‍👨 TE AMO PARA SIEMPRE, MAYDA 👩‍❤️‍💋‍👨"); }, 185000);
            setTimeout(() => { window.location.href = "/boveda"; }, 196000);
        }
    </script>
</body>
</html>
