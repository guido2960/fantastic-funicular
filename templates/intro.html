<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi Administradora</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #canvasUniverso { position: absolute; top: 0; left: 0; }
        #interfaz { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #texto-emocional { font-size: 28px; text-align: center; text-shadow: 0 0 20px #ff4d94; padding: 20px; font-weight: bold; }
        #pantalla-inicio { position: fixed; width: 100%; height: 100%; background: black; z-index: 100; display: flex; justify-content: center; align-items: center; pointer-events: all; }
        #btn-entrar { padding: 20px 40px; font-size: 22px; cursor: pointer; background: #ff4d94; border: none; color: white; border-radius: 50px; box-shadow: 0 0 30px #ff4d94; transition: 0.3s; }
        #btn-entrar:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div id="pantalla-inicio">
    <button id="btn-entrar" onclick="iniciarHistoria()">Entrar a nuestra historia</button>
</div>

<div id="interfaz">
    <div id="texto-emocional"></div>
</div>

<canvas id="canvasUniverso"></canvas>

<audio id="musicaFondo" loop preload="auto">
    <source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a" type="audio/mp4">
</audio>
<audio id="audioVoz" preload="auto">
    <source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4" type="audio/mp4">
</audio>

<script>
    const canvas = document.getElementById('canvasUniverso');
    const ctx = canvas.getContext('2d');
    const textoDiv = document.getElementById('texto-emocional');
    const musica = document.getElementById('musicaFondo');
    const voz = document.getElementById('audioVoz');
    
    let particulas = [];
    let estrellasFijas = []; 
    let fase = "paz"; 
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    for(let i=0; i<300; i++) {
        estrellasFijas.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            opacidad: Math.random() * 0.5 + 0.1
        });
    }

    class Particula {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = -Math.random() * 1.5;
            this.color = "white";
            this.tamaño = Math.random() * 2 + 0.5;
            this.opacidad = 1;
            this.objetivoX = null;
            this.objetivoY = null;
        }
        actualizar() {
            if (fase === "paz") {
                this.y += this.vy;
                if (this.y < 0) this.y = canvas.height;
            } else if (fase === "avion" || fase === "corazon") {
                this.x += (this.objetivoX - this.x) * 0.05;
                this.y += (this.objetivoY - this.y) * 0.05;
            } else if (fase === "fuegos") {
                this.x += this.vx * 6;
                this.y += this.vy * 6;
                this.opacidad -= 0.01;
            } else if (fase === "petalos") {
                this.y += 1.3;
                this.x += Math.sin(this.y * 0.03) * 1.5;
                this.color = "rgba(255, 182, 193, " + this.opacidad + ")";
                if (this.y > canvas.height) { this.y = -10; this.opacidad = Math.random(); }
            }
        }
        dibujar() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.tamaño, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.globalAlpha = Math.max(0, this.opacidad);
            ctx.fill();
        }
    }

    for (let i = 0; i < 700; i++) particulas.push(new Particula());

    function escribir(txt) {
        let i = 0; textoDiv.innerHTML = "";
        const intervalId = setInterval(() => {
            if(i < txt.length) { textoDiv.innerHTML += txt.charAt(i); i++; }
            else clearInterval(intervalId);
        }, 75);
    }

    function formarFigura(tipo) {
        fase = tipo;
        particulas.forEach((p, i) => {
            const t = i / particulas.length * Math.PI * 2;
            if (tipo === "corazon") {
                p.color = "#ff4d94";
                p.objetivoX = canvas.width/2 + 180 * Math.pow(Math.sin(t), 3);
                p.objetivoY = canvas.height/2 - (150 * Math.cos(t) - 60 * Math.cos(2*t) - 30 * Math.cos(3*t) - 15 * Math.cos(4*t));
            } else if (tipo === "avion") {
                p.color = "#87CEEB";
                p.objetivoX = canvas.width/2 + (i%50 * 10) - 250;
                p.objetivoY = canvas.height/2 + (Math.sin(i*0.5)*20);
            }
        });
    }

    function iniciarHistoria() {
        document.getElementById('pantalla-inicio').style.display = 'none';
        
        // FORZAR AUDIO AL CLIC
        musica.load();
        voz.load();
        musica.volume = 0.3;
        musica.play().catch(e => console.log("Error de audio:", e));

        escribir("Todo comenzó con esta paz que me diste...");
        setTimeout(() => escribir("Me permitiste conocer cada capa de tu alma..."), 10000);

        setTimeout(() => {
            formarFigura("avion");
            escribir("Y empezamos a volar hacia un mismo norte.");
        }, 25000);

        setTimeout(() => {
            formarFigura("corazon");
            musica.volume = 0.08; 
            voz.play().catch(e => console.log("Error de voz:", e));
            escribir("Escucha esto que tengo para ti...");
        }, 45000);

        setTimeout(() => escribir("Eres el amor de mi vida, Mayda."), 55000);

        setTimeout(() => {
            fase = "fuegos";
            escribir("👩‍❤️‍💋‍👨 TE AMO, MI ADMINISTRADORA 👩‍❤️‍💋‍👨");
            setTimeout(() => {
                fase = "petalos";
                particulas.forEach(p => { p.opacidad = 1; p.tamaño = 3; });
            }, 3000);
            setTimeout(() => {
                document.body.style.transition = "opacity 2s";
                document.body.style.opacity = "0";
                setTimeout(() => { window.location.href = "/boveda"; }, 2000);
            }, 9000);
        }, 65000);
    }

    function animar() {
        let gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
        gradient.addColorStop(0, "#0c001a"); 
        gradient.addColorStop(1, "#000000"); 
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";
        estrellasFijas.forEach(ef => {
            ctx.globalAlpha = ef.opacidad;
            ctx.fillRect(ef.x, ef.y, 1, 1);
        });

        particulas.forEach(p => { p.actualizar(); p.dibujar(); });
        requestAnimationFrame(animar);
    }
    animar();
</script>
</body>
</html>
