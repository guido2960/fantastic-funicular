<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi Norte</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        
        #contenedor-texto {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            z-index: 100;
        }
        #texto-guion {
            color: white;
            font-size: 28px;
            font-style: italic;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0,0,0,1), 0 0 10px rgba(255,255,255,0.5);
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 25px;
            border-radius: 15px;
            display: inline-block;
            transition: opacity 1.5s;
            opacity: 0;
        }

        #pantalla-inicio {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #btn-iniciar {
            padding: 15px 35px;
            font-size: 18px;
            color: white;
            background: transparent;
            border: 2px solid white;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }
        #btn-iniciar:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <button id="btn-iniciar" onclick="iniciarHistoria()">Entrar al universo de Mayda</button>
    </div>
    
    <div id="contenedor-texto">
        <div id="texto-guion"></div>
    </div>

    <canvas id="canvas"></canvas>

    <audio id="musica-fondo" src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a" loop></audio>
    <audio id="voz-abel" src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4"></audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const textoDiv = document.getElementById('texto-guion');
        const musica = document.getElementById('musica-fondo');
        const voz = document.getElementById('voz-abel');
        let particulas = [];
        let fase = "paz";

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particula {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.objetivoX = this.x;
                this.objetivoY = this.y;
                this.color = "#ffffff";
                this.tamaño = Math.random() * 2;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.velocidadVuelo = 0.4 + Math.random() * 0.5;
            }
            actualizar() {
                if (fase === "celebracion") {
                    this.x += this.vx * 3; this.y += this.vy * 3;
                } else if (fase === "paz" || fase === "avion") {
                    this.x -= this.velocidadVuelo;
                    if (this.x < 0) this.x = canvas.width;
                    this.x += (this.objetivoX - this.x) * 0.05;
                    this.y += (this.objetivoY - this.y) * 0.05;
                } else {
                    this.x += (this.objetivoX - this.x) * 0.05;
                    this.y += (this.objetivoY - this.y) * 0.05;
                }
            }
            dibujar() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.tamaño, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<1200; i++) particulas.push(new Particula());

        function escribir(txt) {
            textoDiv.style.opacity = 0;
            setTimeout(() => {
                textoDiv.innerHTML = txt;
                textoDiv.style.opacity = 1;
            }, 1000);
        }

        function formarFigura(tipo) {
            fase = tipo;
            particulas.forEach((p, i) => {
                if (tipo === "arbol") { 
                    p.color = "#4CAF50"; 
                    if (i < 450) { 
                        p.objetivoX = canvas.width/2 + (Math.random()-0.5)*35;
                        p.objetivoY = canvas.height/2 + (i%220);
                    } else { 
                        let a = Math.random()*Math.PI*2; let r = Math.random()*170;
                        p.objetivoX = canvas.width/2 + Math.cos(a)*r;
                        p.objetivoY = canvas.height/2 - 70 + Math.sin(a)*r;
                    }
                }
                else if (tipo === "avion") { 
                    p.color = "#87CEEB"; 
                    p.objetivoX = (i % 60) * 9 + (canvas.width/4);
                    p.objetivoY = canvas.height/2 + Math.sin(i)*18;
                }
                else if (tipo === "imperio") { 
                    const colores = ["#FFD700", "#00BFFF", "#32CD32", "#FF4500", "#C0C0C0"];
                    let edif = i % 5; p.color = colores[edif];
                    let base = (edif + 1) * (canvas.width/6);
                    p.objetivoX = base + (Math.random()*50 - 25);
                    p.objetivoY = canvas.height - (Math.random()*(canvas.height*0.58));
                }
                else if (tipo === "corazon") {
                    p.color = "#ff3366";
                    let t = Math.random()*Math.PI*2;
                    p.objetivoX = canvas.width/2 + 160*Math.pow(Math.sin(t),3);
                    p.objetivoY = canvas.height/2 - (130*Math.cos(t) - 50*Math.cos(2*t) - 20*Math.cos(3*t));
                }
            });
        }

        function granFinal() {
            fase = "celebracion";
            particulas.forEach((p, i) => {
                p.color = i % 2 === 0 ? "#ff4d94" : ["#FFD700", "#FFFFFF", "#00BFFF"][i%3];
                let ang = Math.random()*Math.PI*2; let vel = 8 + Math.random()*10;
                p.vx = Math.cos(ang)*vel; p.vy = Math.sin(ang)*vel;
                p.x = canvas.width/2; p.y = canvas.height/2;
            });
        }

        function animar() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particulas.forEach(p => { p.actualizar(); p.dibujar(); });
            requestAnimationFrame(animar);
        }

        function iniciarHistoria() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            musica.volume = 0.4;
            musica.play();
            animar();
            
            escribir("Todo comenzó con esta paz que me diste, mi Administradora."); 

            setTimeout(() => { formarFigura("arbol"); escribir("Me tomó tiempo entender cada capa de tu alma, pero cada una vale la pena."); }, 30000);
            setTimeout(() => { formarFigura("avion"); escribir("Admiro tu fuerza en Modo Acción... por eso mi vida vuela hacia tu Norte."); }, 60000);
            setTimeout(() => { formarFigura("imperio"); escribir("Eres una Administradora brillante. Admiro tu visión y quiero ser tu socio de vida."); }, 90000);
            setTimeout(() => { fase = "paz"; escribir("Tomo tan en serio cada video y mensaje que me mandas... me encanta escucharte."); }, 125000);
            setTimeout(() => { particulas.forEach(p => p.color = "#ffffff"); escribir("Me encantaría darte ese primer beso... pero amo aún más respetar tu ritmo."); }, 155000);
            
            setTimeout(() => { 
                formarFigura("corazon"); 
                escribir("Escucha esto que tengo guardado solo para ti...");
                musica.volume = 0.15; 
                voz.play();
            }, 175000);

            setTimeout(() => { 
                granFinal(); 
                escribir("👩‍❤️‍💋‍👨 TE AMO PARA SIEMPRE, MAYDA 👩‍❤️‍💋‍👨"); 
            }, 185000);

            setTimeout(() => { 
                document.body.style.transition = "opacity 3s";
                document.body.style.opacity = "0";
                setTimeout(() => { window.location.href = "/boveda"; }, 3000);
            }, 196000);
        }
    </script>
</body>
</html>
