<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Administradora - SincronizaciГіn Total</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; }
        #interfaz { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #texto-emocional { font-size: 26px; text-align: center; text-shadow: 0 0 20px #ff4d94, 0 0 10px #fff; padding: 25px; font-weight: bold; max-width: 85%; line-height: 1.5; }
        #pantalla-inicio { position: fixed; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; }
        #btn-entrar { padding: 22px 60px; font-size: 22px; cursor: pointer; background: none; border: 2px solid #ff4d94; color: #fff; border-radius: 100px; box-shadow: 0 0 40px #ff4d94; transition: 0.6s; letter-spacing: 5px; font-weight: bold; }
        #btn-entrar:hover { background: #ff4d94; transform: scale(1.1); box-shadow: 0 0 60px #ff4d94; }
    </style>
</head>
<body>

<div id="pantalla-inicio"><button id="btn-entrar" onclick="iniciarExperiencia()">SINTONIZAR</button></div>
<div id="interfaz"><div id="texto-emocional"></div></div>
<canvas id="universo"></canvas>

<audio id="musica" loop src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a"></audio>
<audio id="voz" src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4"></audio>

<script>
    const canvas = document.getElementById('universo');
    const ctx = canvas.getContext('2d');
    const textoDiv = document.getElementById('texto-emocional');
    const musica = document.getElementById('musica');
    const voz = document.getElementById('voz');

    let particulas = [], fase = "paz", t = 0;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // --- MOTOR DE PARTГҚCULAS (MГҒXIMO BRILLO Y ESTELA) ---
    class Particula {
        constructor() {
            this.reset();
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
        }
        reset() {
            this.targetX = Math.random() * canvas.width;
            this.targetY = Math.random() * canvas.height;
            this.color = "255, 255, 255";
            this.size = Math.random() * 1.8 + 0.4;
            this.speed = 0.06 + Math.random() * 0.04; // MГҒS RГҒPIDAS PARA ARMAR LA FIGURA
        }
        update() {
            if (fase === "paz") {
                this.y -= 0.6;
                if (this.y < 0) this.y = canvas.height;
            } else {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = rgb(${this.color});
            ctx.fill();
        }
    }

    for (let i = 0; i < 2000; i++) particulas.push(new Particula());

    // --- LOGICA DE SINCRONIZACIГ“N (LA CLAVE) ---
    // Cada evento define: el texto detonante Y la figura a formar al FINAL de la frase.
    const secuencia = [
        { texto: "Todo comenzГі con esta paz que me diste, mi Administradora favorita...", figura: "paz" },
        { texto: "Me tomГі tiempo entender tus capas, pero cada silencio es mi tesoro.", figura: "arbol" },
        { texto: "Admiro tu fuerza en Modo AcciГіn. Eres brillante; quiero construir un imperio a tu lado.", figura: "imperio" },
        { texto: "Por eso mi vida siempre vuela hacia tu Norte, porque contigo el camino es mГЎs claro.", figura: "avion" },
        { texto: "DarГӯa todo por ese primer beso, pero amo mГЎs respetar tu ritmo y esperarte siempre.", figura: "corazon" },
        { texto: "Escucha esto que guardГ© solo para ti...", figura: "voz", callbackAudio: true }
    ];

    let indexEvento = 0;

    function procesarSiguienteEvento() {
        if (indexEvento < secuencia.length) {
            const evento = secuencia[indexEvento];
            indexEvento++;

            // Primero, escribimos el texto.
            escribir(evento.texto, () => {
                // Al terminar de escribir, detona la figura.
                formarFigura(evento.figura);

                // Si este evento detona el audio, lo coordinamos.
                if (evento.callbackAudio) {
                    musica.volume = 0.15;
                    voz.play();
                }

                // Esperamos un momento para que ella aprecie la figura y el texto, y pasamos al siguiente.
                // Esta espera es para el flujo de lectura, no para la formaciГіn de la imagen.
                setTimeout(procesarSiguienteEvento, 3500);
            });
        } else {
            // FinalizaciГіn de la experiencia
            fase = "paz";
            escribir("рҹ‘©вҖҚвқӨпёҸвҖҚрҹ’ӢвҖҚрҹ‘Ё TE AMO PARA SIEMPRE, MAYDA рҹ‘©вҖҚвқӨпёҸвҖҚрҹ’ӢвҖҚрҹ‘Ё");
            setTimeout(() => {
                document.body.style.transition = "opacity 6s";
                document.body.style.opacity = "0";
                setTimeout(() => { window.location.href = "/boveda"; }, 6000);
            }, 18000);
        }
    }

    // --- MOTOR VISUAL DE FIGURAS (LOS DETONANTES) ---
    function formarFigura(figura) {
        fase = figura;
        // Ajustamos la velocidad de las partГӯculas para que sea un "armado" rГЎpido.
        const velocidadArmado = figura === "paz" ? 0.02 : 0.12; 
        
        particulas.forEach((p, i) => {
            p.speed = velocidadArmado; // Cambiamos la velocidad segГәn la fase
            const ang = (i / particulas.length) * Math.PI * 2;
            
            if (figura === "arbol") { // El ГҒrbol de las Capas
                p.color = "140, 255, 140";
                if (i < 1000) { 
                    p.targetX = canvas.width/2 + Math.cos(i) * (220 * Math.random());
                    p.targetY = canvas.height/2 - 60 - (Math.random() * 250);
                } else {
                    p.targetX = canvas.width/2 + (i % 25 - 12);
                    p.targetY = canvas.height/2 + (i % 220);
                }
            } else if (figura === "imperio") { // El Imperio de la Administradora
                p.color = "255, 230, 100";
                p.targetX = (canvas.width/2 - 280) + (i % 35 * 16);
                p.targetY = (canvas.height - 180) - (Math.floor(i / 35) * 6);
            } else if (figura === "avion") { // El Vuelo al Norte
                p.color = "150, 230, 255";
                if (i < 800) {
                    p.targetX = canvas.width/2 + Math.cos(i) * 450;
                    p.targetY = canvas.height/2 + (i % 2 === 0 ? 18 : -18);
                } else {
                    p.targetX = canvas.width/2 + (i - 1200) * 5;
                    p.targetY = canvas.height/2;
                }
            } else if (figura === "corazon") { // Amor Puro
                p.color = "255, 100, 180";
                p.targetX = canvas.width/2 + 280 * Math.pow(Math.sin(ang), 3);
                p.targetY = canvas.height/2 - (230 * Math.cos(ang) - 90 * Math.cos(2*ang) - 45 * Math.cos(3*ang) - 20 * Math.cos(4*ang));
            } else {
                p.color = "255, 255, 255"; // Paz
                p.reset(); 
            }
        });
    }

    // --- UTILIDADES ---
    function escribir(txt, next) {
        let i = 0; textoDiv.innerHTML = "";
        const interval = setInterval(() => {
            if (i < txt.length) { textoDiv.innerHTML += txt.charAt(i); i++; }
            else { clearInterval(interval); if (next) next(); }
        }, 55);
    }

    function iniciarExperiencia() {
        document.getElementById('pantalla-inicio').style.display = 'none';
        musica.volume = 0.4; musica.play();
        // Iniciamos la secuencia coordinada
        procesarSiguienteEvento();
    }

    function render() {
        // Estela larga y elegante (Motion Blur)
        ctx.fillStyle = 'rgba(0, 0, 0, 0.08)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Brillo acumulativo (Bloom / NeГіn)
        ctx.globalCompositeOperation = "lighter";
        particulas.forEach(p => { p.update(); p.draw(); });
        ctx.globalCompositeOperation = "source-over";

        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
