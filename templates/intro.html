<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Universo de Abel y May</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); z-index: 100;
        }
        button {
            padding: 15px 40px; font-size: 18px; cursor: pointer;
            background: transparent; color: #fff; border: 2px solid #fff;
            border-radius: 50px; transition: 0.5s; text-transform: uppercase; letter-spacing: 2px;
        }
        button:hover { background: #fff; color: #000; box-shadow: 0 0 30px #fff; }
    </style>
</head>
<body>

    <div id="overlay">
        <button onclick="comenzarExperiencia()">Entrar a nuestro universo</button>
    </div>

    <canvas id="canvas"></canvas>

    <audio id="musicaFondo" src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/musica_de_fondo_fuo3r2.m4a" loop></audio>
    <audio id="miVoz" src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1772691824/mi_audio_e07s2p.mp4"></audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const musica = document.getElementById('musicaFondo');
        const voz = document.getElementById('miVoz');

        let estrellas = [];
        let mensajeCompleto = "";
        let mensajeMostrado = "";
        let indexLetra = 0;
        let animando = false;
        let modoMagia = "normal"; // normal, fuego, abrazo

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function comenzarExperiencia() {
            document.getElementById('overlay').style.display = 'none';
            animando = true;
            musica.volume = 0.4;
            musica.play();
            crearEstrellas();
            update();

            // 5s: Saludo Inicial
            setTimeout(() => {
                mensajeCompleto = "Hola mi administradora favorita...";
                escribirTexto();
            }, 5000);

            // 20s: Reflexión de las capas
            setTimeout(() => {
                mensajeCompleto = "Gracias por ser mi paz.\nAmo conocer cada capa de ti.";
                mensajeMostrado = ""; indexLetra = 0;
                escribirTexto();
            }, 20000);

            // 45s: Tu voz + Fuegos Artificiales
            setTimeout(() => {
                mensajeMostrado = ""; 
                musica.volume = 0.1;
                voz.play();
                modoMagia = "fuego"; 
            }, 45000);

            // 52s: El encuentro (Programador y Administradora)
            setTimeout(() => {
                modoMagia = "abrazo";
                mensajeMostrado = "👨‍💻       👩‍💼"; 
            }, 52000);

            // 55s: El Abrazo
            setTimeout(() => {
                mensajeMostrado = "🫂\nNuestra Unión";
            }, 55000);

            // 58s: EL BESO FINAL
            setTimeout(() => {
                mensajeMostrado = "👩‍❤️‍💋‍👨\nTe amo, May";
            }, 58000);

            // 62s: Redirección automática a la Bóveda
            setTimeout(() => {
                window.location.href = "/boveda";
            }, 62000);
        }

        function escribirTexto() {
            if (indexLetra < mensajeCompleto.length) {
                mensajeMostrado += mensajeCompleto.charAt(indexLetra);
                indexLetra++;
                setTimeout(escribirTexto, 100);
            }
        }

        function crearEstrellas() {
            const total = 250;
            for(let i=0; i<total; i++) {
                const t = (i / total) * 2 * Math.PI;
                estrellas.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    // Destino para formar el corazón
                    tx: (16 * Math.sin(t) ** 3) * 12 + canvas.width/2,
                    ty: (- (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))) * 12 + canvas.height/2,
                    r: Math.random() * 2,
                    color: 'white'
                });
            }
        }

        function update() {
            if(!animando) return;
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            estrellas.forEach(e => {
                if (modoMagia === "normal") {
                    e.y -= 0.5;
                    if(e.y < 0) e.y = canvas.height;
                } else if (modoMagia === "fuego") {
                    e.x += e.vx;
                    e.y += e.vy;
                    e.color = hsl(${Math.random() * 360}, 100%, 70%);
                } else if (modoMagia === "abrazo") {
                    // Las estrellas viajan hacia el corazón
                    e.x += (e.tx - e.x) * 0.05;
                    e.y += (e.ty - e.y) * 0.05;
                    e.color = "#ff4d6d";
                }
                
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
                ctx.fill();
            });

            if(mensajeMostrado) {
                ctx.fillStyle = "white";
                ctx.font = "22px 'Courier New'";
                ctx.textAlign = "center";
                const lineas = mensajeMostrado.split('\n');
                lineas.forEach((l, i) => {
                    ctx.fillText(l, canvas.width/2, (canvas.height/2) + (i*50));
                });
            }
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
